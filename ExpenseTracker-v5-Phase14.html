<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker v5 — Phase 8–11 Complete</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fa;--border:#e0e0e0;--text:#1a1a2e;--text2:#555;--text3:#888;--text4:#bbb;--primary:#667eea;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--sh:rgba(0,0,0,.06);--sh2:rgba(0,0,0,.12);--sh3:rgba(0,0,0,.35)}
.dark{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3347;--text:#e8eaf6;--text2:#b0b8d1;--text3:#6b7499;--text4:#404868;--sh:rgba(0,0,0,.25);--sh2:rgba(0,0,0,.45);--sh3:rgba(0,0,0,.7)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
.app{max-width:1200px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 20px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:1.4rem;font-weight:700}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.btn-primary{background:#fff;color:#667eea}.btn-primary:hover{background:#f0f0f0}
.btn-income{background:rgba(16,185,129,.85);color:#fff;border:1px solid rgba(255,255,255,.3)}.btn-income:hover{background:#059669}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;transition:all .2s}
.btn-icon:hover{background:rgba(255,255,255,.35)}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.dark-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.dark-toggle-track{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.35);position:relative;flex-shrink:0;transition:background .2s}
.dark-toggle-track.on{background:rgba(255,255,255,.5)}
.dark-toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dark-toggle-track.on .dark-toggle-thumb{left:20px}
.dark-toggle-label{font-size:12px;color:rgba(255,255,255,.85);white-space:nowrap}
.tabs{display:flex;gap:4px;background:var(--surface);padding:6px;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 8px var(--sh);flex-wrap:wrap}
.tab{padding:8px 16px;border:none;background:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text3);transition:all .2s;flex:1;min-width:80px;text-align:center}
.tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 2px 8px rgba(102,126,234,.4)}
.tab:hover:not(.active){background:var(--surface2)}
.card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px var(--sh)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.summary-card{background:var(--surface);border-radius:12px;padding:16px;box-shadow:0 2px 8px var(--sh);border-left:4px solid #667eea}
.summary-card.inc{border-left-color:#10b981}.summary-card.exp{border-left-color:#ef4444}.summary-card.sav{border-left-color:#f59e0b}
.summary-card label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.summary-card .amount{font-size:1.3rem;font-weight:700;margin-top:4px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:stretch}
.filter-bar .f-search{flex:1;min-width:180px}
.filter-bar .f-select{min-width:130px}
.filter-bar .f-month{min-width:140px}
.filter-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s,box-shadow .2s;outline:none}
.filter-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.filter-input::placeholder{color:var(--text4)}
.filter-btn-clear{padding:9px 14px;border:1.5px solid #ef4444;border-radius:8px;cursor:pointer;font-size:13px;background:transparent;color:#ef4444;font-weight:600;white-space:nowrap;transition:all .2s}
.filter-btn-clear:hover{background:#ef4444;color:#fff}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(102,126,234,.12);border:1px solid rgba(102,126,234,.3);border-radius:12px;font-size:12px;color:#667eea;font-weight:500}
.filter-chip button{background:none;border:none;cursor:pointer;color:#667eea;font-size:14px;line-height:1;padding:0 0 0 2px}
.filter-chip button:hover{color:#ef4444}
.results-info{font-size:13px;color:var(--text3);margin-bottom:10px;padding:6px 0}

.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.form-modal{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px var(--sh3)}
.form-modal h2{margin-bottom:20px;font-size:1.2rem;color:var(--text)}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s,box-shadow .2s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-actions .btn{flex:1}
.currency-preview{font-size:12px;color:#10b981;margin-top:4px;padding:5px 8px;background:rgba(16,185,129,.1);border-radius:6px;font-weight:600}
.rate-badge{font-size:11px;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;font-weight:600}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#ff6b35,#f59e0b);color:#fff;padding:3px 10px;border-radius:20px;font-weight:700;font-size:14px;cursor:default;user-select:none;white-space:nowrap;}
.rate-live{background:#d1fae5;color:#065f46}.rate-cached{background:#dbeafe;color:#1e40af}.rate-offline{background:#fee2e2;color:#991b1b}.rate-none{background:var(--surface2);color:var(--text3)}
.dark .rate-live{background:rgba(16,185,129,.2);color:#6ee7b7}.dark .rate-cached{background:rgba(59,130,246,.2);color:#93c5fd}.dark .rate-offline{background:rgba(239,68,68,.2);color:#fca5a5}

.date-group{margin-bottom:16px}
.date-group-header{padding:7px 12px;background:var(--surface2);border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.expense-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:10px;margin-bottom:6px;box-shadow:0 1px 4px var(--sh);transition:box-shadow .2s,transform .2s;border-left:3px solid transparent}
.expense-item.has-custom-color{border-left-color:var(--item-accent,transparent)}
.expense-item:hover{box-shadow:0 4px 14px var(--sh2);transform:translateY(-1px)}
.income-item{border-left:3px solid #10b981}
.expense-cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.expense-info{flex:1;min-width:0}
.expense-desc{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.expense-meta{font-size:12px;color:var(--text3);margin-top:2px}
.expense-amount-block{text-align:right;flex-shrink:0}
.amt-primary{font-weight:700;font-size:16px;color:var(--text)}
.amt-primary.foreign{color:#6366f1}
.amt-primary.income-amt{color:#10b981}
.amt-secondary{font-size:11px;color:#10b981;font-weight:600;margin-top:1px}
.type-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#e0e7ff;color:#4338ca;margin-left:4px}
.dark .type-badge{background:rgba(99,102,241,.2);color:#a5b4fc}
.income-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(16,185,129,.15);color:#059669;font-weight:600;margin-left:4px}
.dark .income-badge{background:rgba(16,185,129,.2);color:#6ee7b7}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px 6px;border-radius:4px;transition:color .2s,background .2s;flex-shrink:0}
.dark .delete-btn{color:var(--text2)}
.item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.edit-btn{padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;line-height:1}
.edit-btn:hover{border-color:#667eea;color:#667eea;background:rgba(102,126,234,.08)}
.delete-btn:hover{color:#ef4444;background:rgba(239,68,68,.1)}

.chart-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px}
.chart-card{background:var(--surface);border-radius:12px;padding:20px;box-shadow:0 2px 8px var(--sh)}
.chart-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;text-align:center}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.insight-card{background:var(--surface);border-radius:12px;padding:16px;box-shadow:0 2px 8px var(--sh);border-top:3px solid #667eea}
.insight-card h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)}
.insight-card p{font-size:13px;color:var(--text2);line-height:1.55}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.tags-container{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag-btn{padding:4px 10px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:12px;background:var(--surface);color:var(--text2);transition:all .2s}
.tag-btn.selected{background:#667eea;color:#fff;border-color:#667eea}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:16px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px var(--sh3)}
.modal h3{margin-bottom:12px;font-size:1.1rem;color:var(--text)}

.budget-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:6px}
.budget-fill{height:100%;border-radius:4px;transition:width .3s}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}

.exchange-table{width:100%;border-collapse:collapse;font-size:13px}
.exchange-table th{padding:8px 12px;text-align:left;background:var(--surface2);font-weight:600;font-size:12px;color:var(--text2);position:sticky;top:0;z-index:1}
.exchange-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.exchange-table tr:nth-child(even) td{background:var(--surface2)}

.dow-grid{display:flex;gap:6px;flex-wrap:wrap}
.dow-cell{flex:1;min-width:46px;text-align:center}
.dow-bar{border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text);margin-bottom:4px;min-height:36px}

table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;background:var(--surface2);font-size:12px;color:var(--text2);font-weight:600}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

.no-results{text-align:center;padding:40px 20px;color:var(--text3);background:var(--surface2);border-radius:10px}
.no-results .nr-icon{font-size:40px;margin-bottom:10px}
.highlight{background:rgba(102,126,234,.2);border-radius:2px;padding:0 1px}

/* ── PHASE 6: ADVANCED FILTER PANEL ── */
.filter-advanced-toggle{padding:7px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.filter-advanced-toggle:hover{border-color:#667eea;color:#667eea}
.filter-advanced-toggle.open{border-color:#667eea;background:rgba(102,126,234,.08);color:#667eea}
.filter-advanced-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 8px var(--sh)}
.filter-advanced-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-advanced-label{font-size:12px;font-weight:600;color:var(--text2);min-width:100px;flex-shrink:0}
.filter-range-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;width:140px}
.filter-range-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.filter-range-sep{font-size:12px;color:var(--text3);font-weight:600}
/* Multi-category grid */
.multi-cat-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.multi-cat-chip{padding:4px 11px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;user-select:none}
.multi-cat-chip:hover{border-color:#667eea;color:#667eea}
.multi-cat-chip.active{background:#667eea;border-color:#667eea;color:#fff}
.multi-cat-chip.all-chip{border-style:dashed}
.multi-cat-chip.all-chip.active{background:var(--surface2);border-color:#667eea;color:#667eea;border-style:solid}
/* Debounce spinner in search */
.search-wrap{position:relative;flex:1;min-width:180px}
.search-debounce-dot{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:#667eea;opacity:0;transition:opacity .15s}
.search-debounce-dot.active{opacity:1;animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* Active filter chip extras */
.filter-chip.range-chip{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:#b45309}
.dark .filter-chip.range-chip{color:#fcd34d}
.filter-chip.cat-chip{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);color:#065f46}
.dark .filter-chip.cat-chip{color:#6ee7b7}

/* ── PHASE 7: BUDGET SYSTEM ── */
/* Budget tab layout */
.budget-tab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px}

/* Budget progress bar */
.bbar-wrap{margin-bottom:14px}
.bbar-wrap:last-child{margin-bottom:0}
.bbar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px}
.bbar-label{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.bbar-label .icon{font-size:15px}
.bbar-amounts{font-size:11px;color:var(--text3);white-space:nowrap}
.bbar-amounts .spent{font-weight:700}
.bbar-amounts .spent.ok    {color:#10b981}
.bbar-amounts .spent.warn  {color:#f59e0b}
.bbar-amounts .spent.danger{color:#ef4444}
.bbar-track{height:10px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.bbar-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bbar-fill.ok    {background:linear-gradient(90deg,#34d399,#10b981)}
.bbar-fill.warn  {background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.bbar-fill.danger{background:linear-gradient(90deg,#f87171,#ef4444)}
.bbar-pct{font-size:10px;color:var(--text3);text-align:right;margin-top:3px;font-weight:600}
.bbar-no-budget{font-size:11px;color:var(--text4);font-style:italic;padding:4px 0}

/* Budget input row */
.budget-input-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.budget-input-row:last-child{border-bottom:none;padding-bottom:0}
.budget-input-label{flex:1;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.budget-input-label .sub{font-size:11px;font-weight:400;color:var(--text3)}
.budget-number-input{width:110px;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;text-align:right}
.budget-number-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.budget-number-input::placeholder{font-weight:400;color:var(--text4)}

/* Summary stat cards in budget tab */
.budget-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.budget-stat-card{background:var(--surface2);border-radius:10px;padding:12px 14px;text-align:center}
.budget-stat-card .val{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.budget-stat-card .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* Toast notification stack */
.toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:8000;pointer-events:none}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25);display:flex;align-items:center;gap:10px;pointer-events:all;animation:toastIn .25s ease;min-width:240px;max-width:320px;cursor:pointer;border-left:4px solid}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.toast.exiting{animation:toastOut .2s ease forwards}
.toast.ok    {background:#f0fdf4;color:#14532d;border-left-color:#10b981}
.toast.warn  {background:#fffbeb;color:#78350f;border-left-color:#f59e0b}
.toast.danger{background:#fef2f2;color:#7f1d1d;border-left-color:#ef4444}
.toast.info  {background:#eff6ff;color:#1e3a8a;border-left-color:#3b82f6}
.dark .toast.ok    {background:#052e16;color:#bbf7d0;border-left-color:#10b981}
.dark .toast.warn  {background:#2d1b00;color:#fde68a;border-left-color:#f59e0b}
.dark .toast.danger{background:#2d0a0a;color:#fecaca;border-left-color:#ef4444}
.dark .toast.info  {background:#0c1a3d;color:#bfdbfe;border-left-color:#3b82f6}
.toast-icon{font-size:16px;flex-shrink:0}
.toast-body{flex:1;line-height:1.4}
.toast-body .toast-title{font-size:12px;font-weight:700;margin-bottom:1px}
.toast-body .toast-msg{font-size:11px;font-weight:500;opacity:.85}

/* ══════════════════════════════════════════════════
   PHASE 14 — POLISH & PRODUCTION READINESS
   14-6: Colorblind-friendly mode
   14-7: ARIA / focus improvements
══════════════════════════════════════════════════ */

/* ── 14-6: Colorblind mode toggle button ── */
.cb-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);margin-top:10px}
.cb-toggle-label{font-size:13px;color:var(--text2)}
.cb-toggle-label strong{display:block;margin-bottom:2px;color:var(--text)}
.cb-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.cb-switch input{opacity:0;width:0;height:0}
.cb-switch-track{position:absolute;inset:0;border-radius:12px;background:var(--border);cursor:pointer;transition:background .2s}
.cb-switch input:checked+.cb-switch-track{background:#f97316}
.cb-switch-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s;pointer-events:none}
.cb-switch input:checked~.cb-switch-thumb{transform:translateX(20px)}

/* ── 14-6: Colorblind palette overrides (deuteranopia-safe) ── */
/* Override: expense red → royal blue, income green → vivid orange, savings amber stays */
html.colorblind{
  --cb-exp:   #2563eb;  /* Royal blue  — clearly distinguishable from orange */
  --cb-inc:   #f97316;  /* Vivid orange — clearly distinguishable from blue  */
  --cb-save:  #7c3aed;  /* Purple      — neutral savings indicator            */
  --cb-warn:  #d97706;  /* Amber       — warning (was same amber, fine)       */
  --cb-ok:    #0891b2;  /* Cyan        — success indicator                    */
}
html.colorblind .amt-primary.income-amt{color:var(--cb-inc)!important}
html.colorblind .summary-card.exp .amount{color:var(--cb-exp)!important}
html.colorblind .summary-card.inc .amount{color:var(--cb-inc)!important}
html.colorblind .summary-card.sav .amount{color:var(--cb-save)!important}
html.colorblind .income-item{border-left-color:var(--cb-inc)!important}
html.colorblind .date-group-header span:last-child{color:var(--cb-inc)!important}
html.colorblind .btn-income{background:var(--cb-inc)!important}
html.colorblind .delta-up{color:var(--cb-exp)!important}
html.colorblind .delta-down{color:var(--cb-inc)!important}
html.colorblind .toast.ok .toast-icon~*{color:var(--cb-ok)!important}
/* Budget bar: swap green progress to blue */
html.colorblind .budget-bar-fill[style*='#10b981']{background:var(--cb-ok)!important}
/* Category icon text marks with colorblind pattern for key status */
html.colorblind .insight-badge.good{background:rgba(8,145,178,.15);color:var(--cb-ok)}
html.colorblind .insight-badge.warn{background:rgba(249,115,22,.15);color:var(--cb-inc)}

/* ── 14-7: ARIA focus ring — visible for keyboard nav ── */
:focus-visible{
  outline: 2.5px solid #667eea;
  outline-offset: 2px;
  border-radius: 4px;
}
/* Suppress focus ring for mouse users */
:focus:not(:focus-visible){outline:none}

/* ── 14-7: Skip-to-content link (screen reader + keyboard users) ── */
.skip-link{
  position:absolute;top:-48px;left:8px;
  background:#667eea;color:#fff;
  padding:8px 16px;border-radius:0 0 6px 6px;
  font-weight:700;font-size:13px;text-decoration:none;
  transition:top .15s;z-index:9999;
}
.skip-link:focus{top:0}

/* ── 14-9: Will-change hints for animated elements ── */
.toast{will-change:opacity,transform}
.goal-bar-fill{will-change:width}
.expense-item{will-change:box-shadow,transform}

/* ── 14-10: Cross-browser vendor prefixes ── */
.expense-item:hover{-webkit-transform:translateY(-1px);transform:translateY(-1px)}
.tabs{-webkit-overflow-scrolling:touch}
.form-modal{-webkit-overflow-scrolling:touch;overflow-y:auto}
select{-webkit-appearance:auto;appearance:auto}
input[type="date"]{-webkit-appearance:textfield;appearance:textfield}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* ── PHASE 13: COMPARISON VIEWS & ENHANCED INSIGHTS ── */
.delta-up   {color:#ef4444;font-weight:700;font-size:12px;white-space:nowrap}
.delta-down {color:#10b981;font-weight:700;font-size:12px;white-space:nowrap}

.insight-badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-left:6px;vertical-align:middle}
.insight-badge.new  {background:rgba(102,126,234,.15);color:#667eea}

.comparison-legend{display:flex;gap:12px;font-size:11px;color:var(--text3)}
.comparison-legend span{display:flex;align-items:center;gap:4px}

/* ── PHASE 8-5: CATEGORY ALLOCATION SPLIT ── */
.cat-alloc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:8px}
.cat-alloc-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface2);transition:border-color .15s}

.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:16px}

.goal-card-icon{font-size:28px;flex-shrink:0;line-height:1}

.goal-card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.goal-bar-track{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;margin-bottom:10px}

.goal-remaining{font-size:11px;color:var(--text3);margin-top:4px}
.goal-contribs{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}

.goal-empty{text-align:center;padding:40px 20px;color:var(--text3);background:var(--surface2);border-radius:10px}
.goal-create-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:2px dashed var(--border);border-radius:14px;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--text3);transition:all .2s}
.goal-create-btn:hover{border-color:#667eea;color:#667eea;background:rgba(102,126,234,.05)}
.goal-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.goal-stat-card{background:var(--surface2);border-radius:10px;padding:12px 14px;text-align:center}
.goal-stat-card .val{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.goal-stat-card .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* Goal modal */
.goal-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px}
.goal-modal{background:var(--surface);border-radius:16px;padding:24px;max-width:440px;width:100%;box-shadow:0 24px 64px var(--sh3);max-height:90vh;overflow-y:auto}
.goal-modal h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:16px}
.goal-form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.goal-form-group{margin-bottom:10px}
.goal-form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.goal-form-group input,.goal-form-group select{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s}
.goal-form-group input:focus,.goal-form-group select:focus{border-color:#667eea}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px}
.emoji-opt{font-size:18px;padding:4px;border-radius:6px;cursor:pointer;text-align:center;transition:background .1s;border:2px solid transparent}
.emoji-opt:hover{background:var(--surface2)}
.emoji-opt.active{background:rgba(102,126,234,.15);border-color:#667eea}
.goal-modal-actions{display:flex;gap:10px;margin-top:16px}
.goal-modal-actions button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}

/* ── PHASE 4-5: HEATMAP ── */
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap-grid{display:inline-flex;gap:3px;flex-direction:row}
.heatmap-week{display:flex;flex-direction:column;gap:3px}
.heatmap-cell{width:13px;height:13px;border-radius:3px;cursor:pointer;transition:transform .1s,box-shadow .1s;flex-shrink:0}

.heatmap-mode-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}

// ═══ RATE MANAGER ═══
const RM = {
  KEY:'et_v5_rates', TTL:6*3600*1000,
  async fetchLive(baseCurrency){
    const base=baseCurrency||'INR';
    const res=await fetch(`https://api.exchangerate-api.com/v4/latest/${base}`);
    if(!res.ok)throw new Error(res.status);
    const d=await res.json();
    // Always build INR-relative rate table: rates[X] = how many INR per 1 unit of X
    const r={INR:1};
    if(base==='INR'){
      for(const[c,v]of Object.entries(d.rates))if(c!=='INR'&&v>0)r[c]=1/v;
    }else{
      // d.rates: 1 base = d.rates[X] units of X (e.g. base=USD → d.rates.INR=83.4 means 1 USD=83.4 INR)
      const inrPerBase=d.rates['INR'];
      if(inrPerBase&&inrPerBase>0){
        r[base]=inrPerBase; // INR per 1 unit of base currency
        for(const[c,v]of Object.entries(d.rates))if(c!=='INR'&&c!==base&&v>0)r[c]=inrPerBase/v;
      }
    }
    const p={rates:r,ts:Date.now(),source:'live'};
    try{
      // Store compressed — rate data can be large (122 currencies)
      const compressed = LZString.compressToUTF16(JSON.stringify(p));
      localStorage.setItem(this.KEY, compressed);
    }catch(e){}
    return p;
  },
  load(){
    try{
      const raw = localStorage.getItem(this.KEY);
      if(!raw) return null;
      // Try LZ-string first, fallback to plain JSON
      let p = null;
      try { p = JSON.parse(LZString.decompressFromUTF16(raw)); } catch(e) {}
      if (!p) try { p = JSON.parse(raw); } catch(e) {}
      return p?.rates ? p : null;
    }catch(e){return null;}
  },
  async get(baseCurrency){
    const c=this.load(),fresh=c&&(Date.now()-c.ts)<this.TTL;
    if(fresh)return{...c,source:'cached'};
    try{return await this.fetchLive(baseCurrency);}catch(e){if(c)return{...c,source:'offline'};return{rates:{INR:1},ts:0,source:'none'};}
  },
  age(ts){if(!ts)return'';const m=Math.round((Date.now()-ts)/60000);if(m<2)return'just now';if(m<60)return m+'m ago';const h=Math.round(m/60);if(h<24)return h+'h ago';return Math.round(h/24)+'d ago';}
};

// STORAGE MANAGER — LZ-String compressed persistence
// ═══════════════════════════════════════════════════════
const SK = 'et_v5_data';
const SK_META = 'et_v5_meta';

const Store = {
  // Compress JSON → LZ-string for ~50% size reduction
  compress(obj) {
    try { return LZString.compressToUTF16(JSON.stringify(obj)); }
    catch(e) { return JSON.stringify(obj); } // fallback: plain JSON
  },
  // Decompress LZ-string → object; falls back gracefully to plain JSON
  decompress(str) {
    if (!str) return null;
    try {
      // Try LZ-string first
      const decompressed = LZString.decompressFromUTF16(str);
      if (decompressed) return JSON.parse(decompressed);
    } catch(e) {}
    try {
      // Fallback: try plain JSON (handles data saved before compression was added)
      return JSON.parse(str);
    } catch(e) { return null; }
  },
  save(data) {
    try {
      const compressed = this.compress(data);
      localStorage.setItem(SK, compressed);
      // Write metadata for debug / size tracking
      const raw = JSON.stringify(data);
      localStorage.setItem(SK_META, JSON.stringify({
        savedAt: Date.now(),
        rawBytes: raw.length,
        compressedBytes: compressed.length,
        ratio: (compressed.length / raw.length * 100).toFixed(1) + '%',
        expenses: (data.expenses||[]).length,
        income: (data.income||[]).length,
        schemaVersion: 5,
      }));
    } catch(e) { console.warn('[Store] save failed:', e.message); }
  },
  load() {
    try {
      const str = localStorage.getItem(SK);
      const obj = this.decompress(str);
      if (obj && typeof obj === 'object') {
        // Ensure arrays exist
        return { expenses: [], income: [], ...obj };
      }
    } catch(e) { console.warn('[Store] load failed:', e.message); }
    return { expenses: [], income: [] };
  },
  getMeta() {
    try { return JSON.parse(localStorage.getItem(SK_META)); } catch(e) { return null; }
  },
  getStorageStats() {
    const meta = this.getMeta();
    if (!meta) return null;
    return {
      ...meta,
      savedAgo: (() => {
        const m = Math.round((Date.now() - meta.savedAt) / 60000);
        if (m < 2) return 'just now';
        if (m < 60) return m + 'm ago';
        return Math.round(m / 60) + 'h ago';
      })(),
    };
  },
};

// ─── Deterministic hash (djb2) ────────────────────────
// Same input string always → same 32-bit unsigned int.
// Used to derive stable IDs and content fingerprints.
function djb2(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return (h >>> 0); // unsigned 32-bit
}

// ─── Content fingerprint ──────────────────────────────
// Two entries with the same date + description + amount + currency + category
// are the same real-world transaction regardless of what `id` they carry.
function fingerprint(entry) {
  const date   = (entry.date || '').trim();
  const desc   = (entry.description || entry.item || entry.name || '').toLowerCase().trim();
  const amount = parseFloat(entry.amount || entry.price || entry.cost || 0).toFixed(2);
  const cur    = (entry.currency || 'INR').toUpperCase();
  const cat    = normCategoryRaw(entry.category || entry.cat || '').toLowerCase().trim();
  return djb2(date + '|' + desc + '|' + amount + '|' + cur + '|' + cat).toString(36);
}

// ─── Stable ID derivation ─────────────────────────────
// If the entry already has an explicit id, keep it unchanged.
// If not, derive a STABLE synthetic id from its fingerprint so the same
// real-world entry always gets the same id, no matter how many times it is imported.
function stableId(partial) {
  const raw = partial.id;
  if (raw !== undefined && raw !== null && raw !== '') return raw;
  return 'fp_' + fingerprint(partial);
}

// ─── Master dedup context ─────────────────────────────
// Build from ANY existing list of records.
// isDuplicate(entry) → true if entry already exists by id OR fingerprint.
// register(entry)    → mark entry as seen (enables intra-batch dedup).
function makeDedupContext(existingList) {
  const ids = new Set();
  const fps = new Set();
  existingList.forEach(e => {
    if (e.id !== undefined && e.id !== null) ids.add(String(e.id));
    fps.add(e._fp || fingerprint(e));
  });
  return {
    isDuplicate(entry) {
      const id = String(entry.id ?? '');
      const fp = entry._fp || fingerprint(entry);
      return (id && ids.has(id)) || fps.has(fp);
    },
    register(entry) {
      if (entry.id !== undefined && entry.id !== null) ids.add(String(entry.id));
      fps.add(entry._fp || fingerprint(entry));
    },
  };
}

// ─── Normalisation helpers ────────────────────────────
const VALID_CATS     = ['Food','Transport','Shopping','Health','Entertainment','Utilities','Housing','Education','Personal','Travel','Finance','Social','Administrative','Other'];
const VALID_PAYMENTS = ['Cash','Credit Card','Debit Card','UPI/QR','Net Banking','Wallet','Cheque','EMI','Other'];
const VALID_EXP_TYPES   = ['variable','fixed','luxury','need','want','investment'];
const VALID_INC_SOURCES = ['Salary','Freelance','Business','Rental','Dividends','Interest','Bonus','Gift','Refund','Side Income','Other'];

const CAT_ALIASES = {
  'food & dining':'Food','food':'Food','dining':'Food','restaurant':'Food','groceries':'Food',
  'transport':'Transport','transportation':'Transport','travel':'Travel','commute':'Transport',
  'shopping':'Shopping','clothes':'Shopping','clothing':'Shopping',
  'health':'Health','medical':'Health','healthcare':'Health',
  'entertainment':'Entertainment','fun':'Entertainment','leisure':'Entertainment',
  'utilities':'Utilities','bills':'Utilities','utility':'Utilities',
  'housing':'Housing','rent':'Housing','home':'Housing',
  'education':'Education','learning':'Education',
  'personal':'Personal','personal care':'Personal',
  'finance':'Finance','investment':'Finance','savings':'Finance',
  'social':'Social','gifts':'Social',
  'administrative':'Administrative','admin':'Administrative','government':'Administrative','legal':'Administrative',
};
// Raw normalise (used inside fingerprint before CATS config is defined)
function normCategoryRaw(raw) {
  const lower = (raw || '').toLowerCase().trim();
  if (CAT_ALIASES[lower]) return CAT_ALIASES[lower];
  const found = VALID_CATS.find(c => c.toLowerCase() === lower);
  return found || 'Other';
}
function normCategory(raw) { return normCategoryRaw(raw); }
function normPayment(raw) {
  if (!raw) return 'Cash';
  const lower = raw.toLowerCase().trim();
  const aliases = { 'card':'Credit Card','credit':'Credit Card','debit':'Debit Card',
    'upi':'UPI/QR','qr':'UPI/QR','gpay':'UPI/QR','phonepe':'UPI/QR','paytm':'Wallet',
    'netbanking':'Net Banking','net banking':'Net Banking','online':'Net Banking',
    'wallet':'Wallet','cheque':'Cheque','check':'Cheque','emi':'EMI' };
  if (aliases[lower]) return aliases[lower];
  const found = VALID_PAYMENTS.find(p => p.toLowerCase() === lower);
  return found || 'Cash';
}
function normExpType(raw) {
  const lower = (raw || '').toLowerCase().trim();
  return VALID_EXP_TYPES.includes(lower) ? lower : 'variable';
}
function normIncomeSource(raw) {
  if (!raw) return 'Other';
  const lower = raw.toLowerCase().trim();
  const found = VALID_INC_SOURCES.find(s => s.toLowerCase() === lower);
  return found || 'Other';
}

// ─── Canonical v5 expense record ───────────────────────
function makeV5Expense(partial = {}, source = 'unknown') {
  const id = stableId(partial);
  const amount = parseFloat(partial.amount || partial.price || partial.cost || partial.value || 0);
  const currency = partial.currency || 'INR';
  const rate = parseFloat(partial.conversionRate || partial.rate || 1);
  const rec = {
    id,
    _fp: fingerprint(partial),  // always-present content fingerprint
    timestamp: partial.timestamp || partial.createdAt || Date.now(),
    date: partial.date || partial.createdDate || new Date().toISOString().split('T')[0],
    description: partial.description || partial.item || partial.name || partial.title || 'Imported',
    amount,
    currency,
    conversionRate: rate,
    amountINR: currency === 'INR' ? amount : parseFloat(partial.amountINR || amount * rate || amount),
    category: normCategory(partial.category || partial.cat || partial.type || ''),
    subcategory: partial.subcategory || partial.sub || partial.subcat || '',
    expenseType: normExpType(partial.expenseType || partial.expense_type || partial.kind || ''),
    paymentMethod: normPayment(partial.paymentMethod || partial.payment || partial.pay || partial.method || ''),
    paymentDescription: partial.paymentDescription || partial.paymentRef || partial.reference || '',
    diningApp: partial.diningApp || partial.app || partial.deliveryApp || '',
    tags: Array.isArray(partial.tags) ? partial.tags : (partial.tags ? [partial.tags] : []),
    notes: partial.notes || partial.note || partial.memo || partial.remarks || '',
    customColor: partial.customColor || partial.colour || partial.color || null,
    budgetCategory: partial.budgetCategory || null,
    // Phase 3 fields
    isRecurring: partial.isRecurring || partial.recurring || false,
    recurringPeriod: partial.recurringPeriod || partial.period || 'monthly',
    nextDueDate: partial.nextDueDate || '',
    splitWith: partial.splitWith || '',
    splitParts: parseInt(partial.splitParts||1)||1,
    receiptRef: partial.receiptRef || partial.receiptNumber || partial.orderId || '',
    version: 5,
    migratedFrom: partial.version ? 'v' + partial.version : source,
    importedFrom: partial.importedFrom || source,
  };
  return rec;
}

function makeV5Income(partial = {}, source = 'unknown') {
  const id = stableId(partial);
  const amount = parseFloat(partial.amount || partial.value || 0);
  const currency = partial.currency || 'INR';
  const rate = parseFloat(partial.conversionRate || partial.rate || 1);
  return {
    id,
    _fp: fingerprint(partial),
    timestamp: partial.timestamp || partial.createdAt || Date.now(),
    date: partial.date || new Date().toISOString().split('T')[0],
    description: partial.description || partial.item || partial.name || 'Income',
    amount,
    currency,
    conversionRate: rate,
    amountINR: currency === 'INR' ? amount : parseFloat(partial.amountINR || amount * rate || amount),
    source: normIncomeSource(partial.source || partial.incomeSource || partial.category || ''),
    paymentMethod: normPayment(partial.paymentMethod || partial.payment || partial.method || 'Net Banking'),
    notes: partial.notes || partial.note || partial.memo || '',
    isRecurring: partial.isRecurring || partial.recurring || false,
    recurringPeriod: partial.recurringPeriod || partial.period || 'monthly',
    type: 'income',
    version: 5,
    migratedFrom: partial.version ? 'v' + partial.version : source,
    importedFrom: partial.importedFrom || source,
  };
}

// ─── Version detector ─────────────────────────────────
function detectVersion(raw) {
  if (raw && raw.schemaVersion === 5) return { version: 5, meta: {} };
  if (raw && (raw.expenses || raw.income)) {
    const sample = (raw.expenses || [])[0] || (raw.income || [])[0] || {};
    if (sample.version === 5 || sample.migratedFrom) return { version: 5, meta: {} };
    if (raw.dailyBudget !== undefined || raw.heatmapData || raw.budgetSettings)
      return { version: 4, meta: { dailyBudget: raw.dailyBudget, budgetSettings: raw.budgetSettings, heatmapData: raw.heatmapData } };
    if (raw.version === 2 || raw.customColors || raw.palette || raw.colorPalette)
      return { version: 2, meta: { palette: raw.palette || raw.customColors || raw.colorPalette } };
    return { version: 'generic-object', meta: {} };
  }
  if (Array.isArray(raw)) {
    const sample = raw[0] || {};
    if (sample.version === 4 || sample.type === 'expense' || sample.type === 'income') return { version: 4, meta: {} };
    if (sample.version === 2 || sample.colour !== undefined || sample.price !== undefined) return { version: 2, meta: {} };
    return { version: 'raw-array', meta: {} };
  }
  return { version: 'unknown', meta: {} };
}

// ─── v2 Migration Adapter ─────────────────────────────
function migrateV2toV5(raw) {
  const items = Array.isArray(raw) ? raw : (raw.expenses || []);
  const migrated = { expenses: [], income: [], _migration: { from: 'v2', at: Date.now(), count: items.length } };
  items.forEach(x => {
    const isIncome = x.type === 'income' || (x.category || '').toLowerCase() === 'income' || x.incomeSource !== undefined;
    if (isIncome) {
      migrated.income.push(makeV5Income({ ...x, source: x.incomeSource || x.source || x.category || 'Other',
        amount: parseFloat(x.amount || x.price || x.cost || 0), customColor: x.colour || x.color }, 'v2'));
    } else {
      migrated.expenses.push(makeV5Expense({ ...x,
        description: x.description || x.item || x.name,
        amount: parseFloat(x.amount || x.price || x.cost || x.value || 0),
        category: x.category || x.cat, subcategory: x.subcategory || x.sub || x.subcat,
        paymentMethod: x.paymentMethod || x.payment || x.pay,
        diningApp: x.diningApp || x.app || x.deliveryApp,
        customColor: x.colour || x.color || x.customColor, tags: x.tags || [], notes: x.notes || x.note || '',
        expenseType: x.expenseType || (x.isFixed ? 'fixed' : x.isLuxury ? 'luxury' : 'variable'),
      }, 'v2'));
    }
  });
  if (raw.palette || raw.customColors || raw.colorPalette) migrated._v2Palette = raw.palette || raw.customColors || raw.colorPalette;
  return migrated;
}

// ─── v4 Migration Adapter ─────────────────────────────
function migrateV4toV5(raw) {
  const allItems = Array.isArray(raw) ? raw : [...(raw.expenses || []), ...(raw.income || [])];
  const migrated = { expenses: [], income: [],
    _migration: { from: 'v4', at: Date.now(), count: allItems.length },
    _v4Settings: { dailyBudget: raw.dailyBudget || null, budgetSettings: raw.budgetSettings || null,
      heatmapData: raw.heatmapData || null, patternData: raw.patternData || null } };
  allItems.forEach(x => {
    const isIncome = x.type === 'income' || x.entryType === 'income' || x.recordType === 'income';
    if (isIncome) {
      migrated.income.push(makeV5Income({ ...x, source: x.source || x.incomeSource || x.category || 'Other' }, 'v4'));
    } else {
      migrated.expenses.push(makeV5Expense({ ...x,
        expenseType: x.expenseType || (x.isFixed||x.fixed?'fixed':x.isNeed||x.need?'need':x.isLuxury||x.luxury?'luxury':'variable'),
        budgetCategory: x.budgetCategory || x.budget_category || null }, 'v4'));
    }
  });
  return migrated;
}

// ─── Master migration + dedup router ─────────────────
// existingExpenses/existingIncome: current app data for dedup context.
// Returns { result, report } where result only contains NEW unique entries.
function runMigration(raw, existingExpenses, existingIncome) {
  existingExpenses = existingExpenses || [];
  existingIncome   = existingIncome   || [];
  const { version, meta } = detectVersion(raw);
  const report = { version, meta, migrated: 0, skipped: 0, warnings: [] };

  // Step 1: run the right adapter → candidate records
  let candidates;
  if (version === 5) {
    candidates = { expenses: (raw.expenses||[]).map(x=>makeV5Expense(x,'v5-repair')),
                   income:   (raw.income||[]).map(x=>makeV5Income(x,'v5-repair')) };
  } else if (version === 2) {
    candidates = migrateV2toV5(raw);
    if (candidates._v2Palette) report.warnings.push('v2 colour palette preserved → _v2Palette (Phase 3).');
  } else if (version === 4) {
    candidates = migrateV4toV5(raw);
    if (candidates._v4Settings && candidates._v4Settings.dailyBudget)
      report.warnings.push('v4 daily budget (₹' + candidates._v4Settings.dailyBudget + ') preserved → _v4Settings (Phase 7).');
    if (candidates._v4Settings && candidates._v4Settings.heatmapData)
      report.warnings.push('v4 heatmap data preserved → _v4Settings (Phase 4).');
  } else {
    const items = Array.isArray(raw) ? raw : (raw.expenses || []);
    candidates = {
      expenses: items.filter(x=>x.type!=='income').map(x=>makeV5Expense(x,'generic')),
      income:   items.filter(x=>x.type==='income').map(x=>makeV5Income(x,'generic')),
    };
    if (raw.income) candidates.income.push(...raw.income.map(x=>makeV5Income(x,'generic')));
    report.warnings.push('Source version undetermined — generic migration applied.');
  }

  // Step 2: two-layer dedup:
  //   Layer A — against existing stored data (id OR fingerprint)
  //   Layer B — intra-batch (prevents duplicates inside the import file itself)
  const expCtx = makeDedupContext(existingExpenses);
  const incCtx = makeDedupContext(existingIncome);

  const newExps = [], newInc = [];
  (candidates.expenses || []).forEach(e => {
    if (expCtx.isDuplicate(e)) { report.skipped++; return; }
    expCtx.register(e);   // block same entry appearing later in this batch
    newExps.push(e);
  });
  (candidates.income || []).forEach(i => {
    if (incCtx.isDuplicate(i)) { report.skipped++; return; }
    incCtx.register(i);
    newInc.push(i);
  });

  report.migrated = newExps.length + newInc.length;
  return { result: { ...candidates, expenses: newExps, income: newInc }, report };
}

function fmtINR(n){if(isNaN(n)||n==null)return'₹0';return'₹'+parseFloat(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});}
function calculateSafeToSpend(monthIncINR,fixedExpINR,savingsGoalINR,todayStr){
  const d=new Date(todayStr+'T12:00:00');
  const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const daysRemaining=daysInMonth-d.getDate()+1;
  const discretionary=monthIncINR-fixedExpINR-savingsGoalINR;
  if(daysRemaining<=0||discretionary<=0) return{dailyAllowance:0,daysRemaining,discretionary};
  return{dailyAllowance:discretionary/daysRemaining,daysRemaining,discretionary};
}
function fmtF(e){const c=CM[e.currency];return(c?c.symbol:e.currency||'₹')+parseFloat(e.amount||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function toINR(e){if(!e)return 0;if(!e.currency||e.currency==='INR')return parseFloat(e.amount||0);return parseFloat(e.amountINR||e.amount||0);}
function byDate(list){const g={};list.forEach(e=>{const d=e.date||'Unknown';(g[d]||(g[d]=[])).push(e);});return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));}

// ─── TEXT SEARCH: searches description, category, subcategory, notes, paymentMethod, tags, diningApp, source ───
function matchesSearch(item, q) {
  if (!q) return true;
  const lq = q.toLowerCase().trim();
  if (!lq) return true;
  const fields = [
    item.description, item.category, item.subcategory,
    item.notes, item.paymentMethod, item.paymentDescription,
    item.diningApp, item.source, item.expenseType,
    item.currency, item.receiptRef, item.splitWith,
    ...(item.tags||[])
  ];
  return fields.some(f => f && String(f).toLowerCase().includes(lq));
}


// ═══ useDebounce HOOK (Phase 6-11) ═══
// Returns a debounced version of `value` that updates after `delay` ms of inactivity.
// Prevents the expensive filteredExp useMemo from running on every keystroke.
function useDebounce(value, delay=300){
  const [debounced,setDebounced]=useState(value);
  useEffect(()=>{
    const t=setTimeout(()=>setDebounced(value),delay);
    return()=>clearTimeout(t);
  },[value,delay]);
  return debounced;
}

// ═══ useStreak HOOK — consecutive days logged ═══
function useStreak(expenses){
  return useMemo(()=>{
    if(!expenses.length) return 0;
    const now=new Date();now.setHours(12,0,0,0);
    const todayStr=now.toISOString().split('T')[0];
    const yest=new Date(now-864e5).toISOString().split('T')[0];
    const dateSet=new Set(expenses.map(e=>e.date));
    let cursor=dateSet.has(todayStr)?todayStr:dateSet.has(yest)?yest:null;
    if(!cursor) return 0;
    let streak=0,d=new Date(cursor+'T12:00:00');
    while(dateSet.has(d.toISOString().split('T')[0])){streak++;d=new Date(d-864e5);}
    return streak;
  },[expenses]);
}

// ═══ CHARTS ═══
function PieChart({data,size=220,fmt}){
  const f=fmt||(v=>fmtINR(v));
  const total=(data||[]).reduce((s,d)=>s+d.value,0);
  if(!total)return<div style={{textAlign:'center',color:'var(--text3)',padding:'28px 0',fontSize:13}}>No data</div>;
  const cx=size/2,cy=size/2,r=size*.37;let a=-90;
  const sl=data.map((it,i)=>{
    const sw=(it.value/total)*360,s=a;a+=sw;
    const R=d=>(d*Math.PI)/180;
    const x1=cx+r*Math.cos(R(s)),y1=cy+r*Math.sin(R(s));
    const x2=cx+r*Math.cos(R(a-.01)),y2=cy+r*Math.sin(R(a-.01));
    // Use item.color if provided (category color), else fall back to CC palette
    return{...it,path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sw>180?1:0} 1 ${x2},${y2} Z`,color:it.color||CC[i%CC.length]};
  });
  return(<div>
    <svg width={size} height={size} style={{display:'block',margin:'0 auto'}}>
      {sl.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="var(--surface)" strokeWidth="2"><title>{s.label}: {f(s.value)} ({(s.value/total*100).toFixed(1)}%)</title></path>)}
      <circle cx={cx} cy={cy} r={r*.45} fill="var(--surface)"/>
      <text x={cx} y={cy-6} textAnchor="middle" fontSize="10" fill="var(--text3)">Total</text>
      <text x={cx} y={cy+11} textAnchor="middle" fontSize="12" fontWeight="700" fill="var(--text)">{f(total)}</text>
    </svg>
    <div className="legend">{sl.slice(0,9).map((s,i)=><div key={i} className="legend-item"><div className="legend-dot" style={{background:s.color}}/><span>{s.label} ({(s.value/total*100).toFixed(0)}%)</span></div>)}</div>
  </div>);
}
function LineChart({data,fmt}){
  const f=fmt||(v=>fmtINR(v));
  if(!data||data.length<2)return<div style={{textAlign:'center',color:'var(--text3)',padding:'28px 0',fontSize:13}}>Not enough data</div>;
  const W=420,H=200,P={t:20,r:20,b:40,l:60},gW=W-P.l-P.r,gH=H-P.t-P.b;
  const vals=data.map(d=>d.value),maxV=Math.max(...vals,1),minV=Math.min(...vals,0),rng=maxV-minV||1;
  const pts=data.map((d,i)=>({x:P.l+(i/(data.length-1))*gW,y:P.t+gH-((d.value-minV)/rng)*gH,label:d.label,value:d.value}));
  const pd=pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(' ');
  const ad=pd+` L${pts[pts.length-1].x},${P.t+gH} L${pts[0].x},${P.t+gH} Z`;
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxHeight:'220px'}}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#667eea" stopOpacity=".25"/><stop offset="100%" stopColor="#667eea" stopOpacity=".02"/></linearGradient></defs>
    {[0,.25,.5,.75,1].map((t,i)=>{const y=P.t+gH*t,v=maxV-t*rng;return<g key={i}><line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke="var(--border)" strokeWidth="1"/><text x={P.l-6} y={y+4} textAnchor="end" fontSize="10" fill="var(--text3)">{v>=1000?(v/1000).toFixed(0)+'k':Math.round(v)}</text></g>;})}
    <path d={ad} fill="url(#lg)"/>
    <path d={pd} fill="none" stroke="#667eea" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="4" fill="#667eea" stroke="var(--surface)" strokeWidth="2"/><title>{p.label}: {f(p.value)}</title>{data.length<=14&&<text x={p.x} y={H-P.b+16} textAnchor="middle" fontSize="9" fill="var(--text3)">{p.label}</text>}</g>)}
  </svg>);
}

function HeatmapCalendar({expenses,income}){
  const [mode,setMode]=React.useState('amount'); // 'amount'|'count'|'income'
  const [tooltip,setTooltip]=React.useState(null); // {text,x,y}

  const today=new Date();
  today.setHours(0,0,0,0);

  // Build 90-day data map (memoised)
  const dayData=React.useMemo(()=>{
    const days={};
    for(let i=89;i>=0;i--){
      const d=new Date(today);
      d.setDate(d.getDate()-i);
      const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      days[key]={date:key,amount:0,count:0,income:0,topCatColor:null,_topVal:0,d};
    }
    expenses.forEach(e=>{
      if(!days[e.date])return;
      const v=toINR(e);
      days[e.date].amount+=v;
      days[e.date].count+=1;
      // Track dominant category colour (v2/custom colour feature - 4-7)
      if(v>days[e.date]._topVal){
        days[e.date]._topVal=v;
        days[e.date].topCatColor=e.customColor||CATS[e.category]?.color||'#667eea';
      }
    });
    income.forEach(inc=>{
      if(days[inc.date])days[inc.date].income+=toINR(inc);
    });
    return Object.values(days);
  },[expenses,income]);

  const maxA=Math.max(...dayData.map(d=>d.amount),1);
  const maxC=Math.max(...dayData.map(d=>d.count),1);
  const maxI=Math.max(...dayData.map(d=>d.income),1);

  const getIntensity=d=>{
    if(mode==='amount') return d.amount/maxA;
    if(mode==='count')  return d.count/maxC;
    return d.income/maxI;
  };

  // Colour logic (implements 4-7: v2/category colours on heatmap cells)
  const getCellBg=d=>{
    const t=getIntensity(d);
    if(t===0) return 'var(--border)';
    const a=0.15+t*0.85;
    if(mode==='amount'){
      // Use the dominant category/custom color (v2 feature - 4-7)
      const base=d.topCatColor||'#667eea';
      // Parse hex to rgba
      const r=parseInt(base.slice(1,3),16);
      const g=parseInt(base.slice(3,5),16);
      const b=parseInt(base.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+','+a.toFixed(2)+')';
    }
    if(mode==='count') return 'rgba(99,102,241,'+a.toFixed(2)+')';
    return 'rgba(16,185,129,'+a.toFixed(2)+')';
  };

  // Organise days into week columns (Sun→Sat)
  // The first cell: what weekday is 89 days ago?
  const firstDay=dayData[0];
  const startDow=new Date(firstDay.date+'T12:00:00').getDay(); // 0=Sun
  // Pad with nulls so week columns align
  const padded=[...Array(startDow).fill(null),...dayData];
  const weeks=[];
  for(let i=0;i<padded.length;i+=7) weeks.push(padded.slice(i,i+7));

  // Month labels: detect month changes across weeks
  const monthLabels=[];
  let lastMonth=-1;
  weeks.forEach((week,wi)=>{
    const firstReal=week.find(d=>d!=null);
    if(!firstReal){monthLabels.push(null);return;}
    const m=new Date(firstReal.date+'T12:00:00').getMonth();
    if(m!==lastMonth){monthLabels.push(new Date(firstReal.date+'T12:00:00').toLocaleString('en',{month:'short'}));lastMonth=m;}
    else monthLabels.push(null);
  });

  const DOW_LABELS=['S','M','T','W','T','F','S'];

  const modeConfig={
    amount:{label:'₹ Expenses',accent:'#667eea'},
    count: {label:'# Count',  accent:'#6366f1'},
    income:{label:'₹ Income', accent:'#10b981'},
  };

  const fmt=d=>{
    const date=new Date(d.date+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    if(mode==='amount') return d.amount>0?date+': '+fmtINR(d.amount)+' spent':date+': No spend';
    if(mode==='count')  return d.count>0?date+': '+d.count+' transaction'+(d.count>1?'s':''):date+': No transactions';
    return d.income>0?date+': '+fmtINR(d.income)+' received':date+': No income';
  };

  const onCell=(e,d)=>{
    if(!d)return;
    const rect=e.currentTarget.getBoundingClientRect();
    setTooltip({text:fmt(d),x:rect.left+rect.width/2,y:rect.top-8});
  };

  // Legend gradient squares
  const legendCells=[0,.2,.4,.6,.8,1].map(t=>({t}));

  return(
    <div>
      {/* Mode toggle */}
      <div className="heatmap-modes">
        {Object.entries(modeConfig).map(([k,v])=>(
          <button key={k} className={'heatmap-mode-btn'+(mode===k?' active':'')}
            onClick={()=>setMode(k)} style={mode===k?{background:v.accent,borderColor:v.accent}:{}}>
            {v.label}
          </button>
        ))}
        <span style={{fontSize:11,color:'var(--text3)',alignSelf:'center',marginLeft:4}}>
          {mode==='amount'&&'Colours = dominant category/custom colour for that day (v2 feature)'}
          {mode==='count' &&'Colour intensity = number of transactions'}
          {mode==='income'&&'Colour intensity = income received'}
        </span>
      </div>

      {/* Tooltip */}
      {tooltip&&(
        <div className="heatmap-tooltip" style={{left:tooltip.x,top:tooltip.y-32,transform:'translateX(-50%)'}}>
          {tooltip.text}
        </div>
      )}

      {/* Grid */}
      <div style={{display:'flex'}} onMouseLeave={()=>setTooltip(null)}>
        {/* Day-of-week labels */}
        <div className="heatmap-day-labels">
          {DOW_LABELS.map((d,i)=>(
            <div key={i} className="heatmap-day-label">{i%2===1?d:''}</div>
          ))}
        </div>

        <div>
          {/* Month labels */}
          <div className="heatmap-month-labels">
            {monthLabels.map((lbl,wi)=>(
              <div key={wi} style={{width:16,marginRight:3,fontSize:9,color:'var(--text3)',whiteSpace:'nowrap',overflow:'visible'}}>
                {lbl||''}
              </div>
            ))}
          </div>

          {/* Cell grid */}
          <div className="heatmap-wrap">
            <div className="heatmap-grid">
              {weeks.map((week,wi)=>(
                <div key={wi} className="heatmap-week">
                  {week.map((d,di)=>(
                    d?
                    <div key={d.date} className="heatmap-cell"
                      style={{background:getCellBg(d)}}
                      onMouseEnter={e=>onCell(e,d)}/>
                    :<div key={'pad-'+di} className="heatmap-cell" style={{background:'transparent'}}/>
                  ))}
                </div>
              ))}
            </div>
          </div>

          {/* Legend */}
          <div className="heatmap-legend">
            <span>Less</span>
            <div className="heatmap-legend-cells">
              {legendCells.map(({t},i)=>{
                let bg;
                if(t===0) bg='var(--border)';
                else if(mode==='amount') bg='rgba(102,126,234,'+t.toFixed(2)+')';
                else if(mode==='count')  bg='rgba(99,102,241,'+t.toFixed(2)+')';
                else bg='rgba(16,185,129,'+t.toFixed(2)+')';
                return<div key={i} style={{width:13,height:13,borderRadius:3,background:bg}}/>;
              })}
            </div>
            <span>More</span>
          </div>
        </div>
      </div>
    </div>
  );
}


// ═══ BUDGET BAR COMPONENT (Phase 7-5) ═══
// Renders a labelled progress bar with colour-coded fill and spent/budget text.
// level: 'ok' (<50%) | 'warn' (50–80%) | 'danger' (>80%)
const BudgetBar=React.memo(function BudgetBar({icon, label, spent, budget, suffix=''}){
  if(!budget||budget<=0){
    return(
      <div className="bbar-wrap">
        <div className="bbar-header">
          <span className="bbar-label">{icon&&<span className="icon">{icon}</span>}{label}</span>
          <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No budget set</span>
        </div>
        <div className="bbar-track"><div className="bbar-fill ok" style={{width:'0%'}}/></div>
      </div>
    );
  }
  const pct = Math.min((spent/budget)*100, 100);
  const over= spent>budget;
  const level= over||pct>=100?'danger':pct>=80?'danger':pct>=50?'warn':'ok';
  const dispPct= over?((spent/budget)*100).toFixed(0):pct.toFixed(0);
  return(
    <div className="bbar-wrap">
      <div className="bbar-header">
        <span className="bbar-label">{icon&&<span className="icon">{icon}</span>}{label}</span>
        <span className="bbar-amounts">
          <span className={`spent ${level}`}>{fmtINR(spent)}</span>
          <span> / {fmtINR(budget)}{suffix}</span>
        </span>
      </div>
      <div className="bbar-track">
        <div className={`bbar-fill ${level}`} style={{width:Math.min(pct,100)+'%'}}/>
      </div>
      <div className="bbar-pct" style={{color:level==='ok'?'#10b981':level==='warn'?'#f59e0b':'#ef4444'}}>
        {over?`⚠️ ${dispPct}% — over by ${fmtINR(spent-budget)}`:`${dispPct}%`}
      </div>
    </div>
  );
});

// ═══ TOAST SYSTEM (Phase 7-6/7/8) ═══
// ToastStack renders a fixed bottom-right stack of dismissible toasts.
// Toasts are auto-dismissed after `duration` ms (default 6000).
// Each toast: { id, kind:'ok'|'warn'|'danger'|'info', title, msg, icon }
function ToastStack({toasts, onDismiss}){
  // Always render the live region so screen readers register it, even when empty
  return(
    <div className="toast-stack" role="status" aria-live="polite" aria-atomic="false" aria-label="Notifications">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.kind||'info'} ${t.exiting?'exiting':''}`}
          onClick={()=>onDismiss(t.id)}>
          <span className="toast-icon">{t.icon||'💡'}</span>
          <div className="toast-body">
            <div className="toast-title">{t.title}</div>
            <div className="toast-msg">{t.msg}</div>
          </div>
          <button className="toast-close" onClick={e=>{e.stopPropagation();onDismiss(t.id);}}>✕</button>
        </div>
      ))}
    </div>
  );
}

// CreateGoalModal — name, target, targetDate, icon
function CreateGoalModal({onSave, onClose}){
  const [form, setForm] = React.useState({
    name: '', target: '', targetDate: '', icon: '🎯', note: ''
  });
  const s = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = e => {
    e.preventDefault();
    const tgt = parseFloat(form.target);
    if(!form.name.trim()||!tgt||tgt<=0) return;
    onSave({
      id: Date.now(),
      name: form.name.trim(),
      target: tgt,
      targetDate: form.targetDate,
      icon: form.icon,
      note: form.note.trim(),
      contributions: [],
      createdAt: new Date().toISOString().split('T')[0],
    });
    onClose();
  };

  return(
    <div className="goal-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="goal-modal">
        <h3>🎯 Create New Goal</h3>
        <form onSubmit={submit}>
          <div className="goal-form-group">
            <label>Goal Name *</label>
            <input value={form.name} onChange={e=>s('name',e.target.value)}
              required placeholder="e.g. Emergency Fund, New Laptop…" autoFocus/>
          </div>
          <div className="goal-form-row">
            <div className="goal-form-group">
              <label>Target Amount (₹) *</label>
              <input type="number" min="1" step="1" value={form.target}
                onChange={e=>s('target',e.target.value)} required placeholder="50000"/>
            </div>
            <div className="goal-form-group">
              <label>Target Date</label>
              <input type="date" value={form.targetDate}
                min={new Date().toISOString().split('T')[0]}
                onChange={e=>s('targetDate',e.target.value)}/>
            </div>
          </div>
          <div className="goal-form-group">
            <label>Icon</label>
            <div className="emoji-grid">
              {GOAL_EMOJIS.map(em=>(
                <div key={em} className={'emoji-opt'+(form.icon===em?' active':'')}

              ))}
            </div>
          </div>
          <div className="goal-form-group">
            <label>Note (optional)</label>
            <input value={form.note} onChange={e=>s('note',e.target.value)}

            <button type="button" style={{background:'var(--surface2)',color:'var(--text2)'}} onClick={onClose}>Cancel</button>

// AddContributionModal — date, amount, note for a specific goal
function AddContributionModal({goal, onSave, onClose}){
  const [form, setForm] = React.useState({
    date: new Date().toISOString().split('T')[0],
    amount: '', note: ''
  });
  const s = (k,v) => setForm(f=>({...f,[k]:v}));

  const contributed = (goal.contributions||[]).reduce((sum,c)=>sum+c.amount,0);
  const remaining   = Math.max(goal.target - contributed, 0);

  const submit = e => {
    e.preventDefault();
    const amt = parseFloat(form.amount);
    if(!amt||amt<=0) return;
    onSave({
      id: Date.now(),
      date: form.date,
      amount: amt,
      note: form.note.trim(),
    });
    onClose();
  };

  return(
    <div className="goal-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="goal-modal">
        <h3>{goal.icon} Add Contribution — <span style={{color:'#667eea'}}>{goal.name}</span></h3>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:14}}>
          Contributed: <strong>{fmtINR(contributed)}</strong> of {fmtINR(goal.target)} &nbsp;·&nbsp; Remaining: <strong>{fmtINR(remaining)}</strong>
        </div>
        <form onSubmit={submit}>
          <div className="goal-form-row">
            <div className="goal-form-group">
              <label>Date *</label>
              <input type="date" value={form.date}
                onChange={e=>s('date',e.target.value)} required/>
            </div>
            <div className="goal-form-group">
              <label>Amount (₹) *</label>
              <input type="number" min="1" step="1" value={form.amount}
                onChange={e=>s('amount',e.target.value)} required autoFocus
                placeholder={remaining>0?remaining.toFixed(0):'any amount'}/>
            </div>
          </div>
          <div className="goal-form-group">
            <label>Note (optional)</label>
            <input value={form.note} onChange={e=>s('note',e.target.value)}
              placeholder="Monthly saving, bonus, etc."/>
          </div>
          <div className="goal-modal-actions">
            <button type="button" style={{background:'var(--surface2)',color:'var(--text2)'}} onClick={onClose}>Cancel</button>
            <button type="submit" style={{background:'#10b981',color:'#fff'}}>Add {form.amount?'₹'+form.amount:'…'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ═══ SHARED FILTER BAR COMPONENT — Phase 6 complete ═══
// Props:
//   search, onSearch, filters, onFilterChange, onClear
//   categories(bool), paymentMethods(bool), currencies(arr), showMonth(bool)
//   month, onMonthChange, placeholder
//   [NEW 6-8] dateFrom, onDateFromChange, dateTo, onDateToChange
//   [NEW 6-9] amtMin, onAmtMinChange, amtMax, onAmtMaxChange
//   [NEW 6-10] selectedCategories(arr), onToggleCategory(fn)
function FilterBar({
  search, onSearch, filters, onFilterChange, onClear,
  categories, paymentMethods, currencies,
  showMonth, month, onMonthChange,
  placeholder,
  // Phase 6 advanced
  dateFrom, onDateFromChange,
  dateTo,   onDateToChange,
  amtMin,   onAmtMinChange,
  amtMax,   onAmtMaxChange,
  selectedCategories, onToggleCategory,
  baseSym, baseCurrCode,
}) {
  const [showAdv, setShowAdv] = useState(false);
  // Local raw search — actual filtering is debounced in parent
  const [rawSearch, setRawSearch] = useState(search);
  // Keep rawSearch in sync when parent clears it
  useEffect(()=>{ if(search==='')setRawSearch(''); },[search]);
  const handleSearch = v => { setRawSearch(v); onSearch(v); };

  const activeChips  = filters.filter(f=>f.value&&f.value!=='All');
  const hasAdvanced  = (dateFrom||dateTo||amtMin!==''||amtMax!==''||
                        (selectedCategories&&selectedCategories.length>0));
  const advCount     = [dateFrom,dateTo,amtMin!==''&&amtMin,amtMax!==''&&amtMax,
                        ...(selectedCategories||[])].filter(Boolean).length;

  return(
    <div>
      {/* ── Row 1: search + quick dropdowns + advanced toggle ── */}
      <div className="filter-bar">

        {/* Search with debounce indicator */}
        <div className="search-wrap">
          <input
            className="filter-input"
            value={rawSearch}
            onChange={e=>handleSearch(e.target.value)}
            placeholder={placeholder||'🔍 Search description, category, notes, tags...'}
            aria-label="Search expenses"
            role="searchbox"
          />
          {rawSearch!==search&&<div className="search-debounce-dot active"/>}
        </div>

        {/* Payment method (quick) */}
        {paymentMethods&&(
          <div className="f-select">
            <select className="filter-input"
              value={filters.find(f=>f.key==='payment')?.value||'All'}
              onChange={e=>onFilterChange('payment',e.target.value)}>
              <option value="All">All Payments</option>
              {PAY_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
        )}

        {/* Currency (quick) */}
        {currencies&&currencies.length>1&&(
          <div className="f-select">
            <select className="filter-input"
              value={filters.find(f=>f.key==='currency')?.value||'All'}
              onChange={e=>onFilterChange('currency',e.target.value)}>
              <option value="All">All Currencies</option>
              {currencies.map(c=>{const cur=CM[c];return<option key={c} value={c}>{cur?cur.flag:''} {c}</option>;})}
            </select>
          </div>
        )}

        {/* Month picker (quick) */}
        {showMonth&&(
          <div className="f-month">
            <input type="month" className="filter-input" value={month}
              onChange={e=>onMonthChange(e.target.value)}/>
          </div>
        )}

        {/* Advanced toggle */}
        <button
          className={'filter-advanced-toggle'+(showAdv?' open':'')}
          onClick={()=>setShowAdv(v=>!v)}
          title="Date range, amount range, multi-category">
          ⚙️ Advanced{advCount>0?` (${advCount})`:''} {showAdv?'▲':'▼'}
        </button>

        {/* Clear all */}
        {(search||activeChips.length>0||month||hasAdvanced)&&(
          <button className="filter-btn-clear" onClick={()=>{setRawSearch('');onClear();}}>✕ Clear All</button>
        )}
      </div>

      {/* ── Advanced panel (6-8, 6-9, 6-10) ── */}
      {showAdv&&(
        <div className="filter-advanced-panel">

          {/* 6-10: Multi-category select */}
          {categories&&(
            <div>
              <div className="filter-advanced-label" style={{marginBottom:6}}>📁 Categories <span style={{fontWeight:400,color:'var(--text3)',fontSize:11}}>(select one or more)</span></div>
              <div className="multi-cat-grid">
                <span
                  className={'multi-cat-chip all-chip'+((selectedCategories||[]).length===0?' active':'')}
                  onClick={()=>{ if((selectedCategories||[]).length>0)(selectedCategories||[]).forEach(c=>onToggleCategory(c)); }}>
                  All
                </span>
                {Object.keys(CATS).map(cat=>(
                  <span key={cat}
                    className={'multi-cat-chip'+((selectedCategories||[]).includes(cat)?' active':'')}
                    onClick={()=>onToggleCategory(cat)}
                    style={(selectedCategories||[]).includes(cat)?{background:CATS[cat].color,borderColor:CATS[cat].color}:{}}>
                    {CATS[cat].icon} {cat}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* 6-8: Date range */}
          <div className="filter-advanced-row">
            <span className="filter-advanced-label">📅 Date range</span>
            <input type="date" className="filter-range-input"
              value={dateFrom||''} onChange={e=>onDateFromChange(e.target.value)}
              max={dateTo||''}
              placeholder="From"/>
            <span className="filter-range-sep">→</span>
            <input type="date" className="filter-range-input"
              value={dateTo||''} onChange={e=>onDateToChange(e.target.value)}
              min={dateFrom||''}
              placeholder="To"/>
            {(dateFrom||dateTo)&&(
              <button style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:13}}
                onClick={()=>{onDateFromChange('');onDateToChange('');}}>✕</button>
            )}
          </div>

          {/* 6-9: Amount range */}
          <div className="filter-advanced-row">
            <span className="filter-advanced-label">💰 Amount ({baseCurrCode||'INR'})</span>
            <input type="number" min="0" className="filter-range-input"
              value={amtMin} onChange={e=>onAmtMinChange(e.target.value)}
              placeholder={'Min '+(baseSym||'₹')}/>
            <span className="filter-range-sep">–</span>
            <input type="number" min="0" className="filter-range-input"
              value={amtMax} onChange={e=>onAmtMaxChange(e.target.value)}
              placeholder={'Max '+(baseSym||'₹')}/>
            {(amtMin!==''||amtMax!=='')&&(
              <button style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:13}}
                onClick={()=>{onAmtMinChange('');onAmtMaxChange('');}}>✕</button>
            )}
          </div>

        </div>
      )}

      {/* ── Active filter chips ── */}
      {(activeChips.length>0||month||hasAdvanced)&&(
        <div className="active-filters">
          {month&&(
            <span className="filter-chip">📅 {month}<button onClick={()=>onMonthChange('')}>×</button></span>
          )}
          {activeChips.map(f=>(
            <span key={f.key} className="filter-chip">
              {f.label}: {f.value}
              <button onClick={()=>onFilterChange(f.key,'All')}>×</button>
            </span>
          ))}
          {(selectedCategories||[]).map(cat=>(
            <span key={cat} className="filter-chip cat-chip">
              {CATS[cat]?.icon} {cat}
              <button onClick={()=>onToggleCategory(cat)}>×</button>
            </span>
          ))}
          {(dateFrom||dateTo)&&(
            <span className="filter-chip range-chip">
              📅 {dateFrom||'…'} → {dateTo||'…'}
              <button onClick={()=>{onDateFromChange('');onDateToChange('');}}>×</button>
            </span>
          )}
          {(amtMin!==''||amtMax!=='')&&(
            <span className="filter-chip range-chip">
