}


// ═══ EXPENSE FORM ═══
function ExpenseForm({onSubmit,onEdit,onClose,rateData,onRateUpdate,initialData,baseSym,baseCurrCode,baseRate}){
  const today=new Date().toISOString().split('T')[0];
  const EXPENSE_DEFAULTS={
    description:'',amount:'',currency:'INR',conversionRate:1,
    category:'Food',subcategory:'',expenseType:'variable',
    date:today,paymentMethod:'Cash',paymentDescription:'',
    diningApp:'',tags:[],notes:'',
    isRecurring:false,recurringPeriod:'monthly',nextDueDate:'',
    splitWith:'',splitParts:2,
    receiptRef:'',
    customColor:null,
    useCatAlloc:false,
    categoryAllocations:{},
  };
  const [form,setForm]=useState(initialData
    ? {
        ...EXPENSE_DEFAULTS,
        ...initialData,
        amount: String(initialData.amount||''),
        conversionRate: initialData.conversionRate||1,
        tags: initialData.tags||[],
        splitParts: initialData.splitParts||2,
        useCatAlloc: !!(initialData.categoryAllocations&&Object.keys(initialData.categoryAllocations||{}).length),
        categoryAllocations: initialData.categoryAllocations||{},
      }
    : EXPENSE_DEFAULTS
  );
  const [lr,setLr]=useState(false);
  const s=(k,v)=>setForm(p=>({...p,[k]:v}));
  const onCC=async code=>{
    s('currency',code);if(code==='INR'){s('conversionRate',1);return;}
    if(rateData?.rates?.[code]){s('conversionRate',parseFloat(rateData.rates[code].toFixed(6)));return;}
    setLr(true);
    try{const f=await RM.fetchLive(baseCurrCode);if(onRateUpdate)onRateUpdate(f);if(f.rates[code])s('conversionRate',parseFloat(f.rates[code].toFixed(6)));}catch(e){}
    setLr(false);
  };
  const calcNextDue=(fromDate,period)=>{
    const d=new Date(fromDate||today);
    if(period==='daily')    d.setDate(d.getDate()+1);
    else if(period==='weekly')   d.setDate(d.getDate()+7);
    else if(period==='biweekly') d.setDate(d.getDate()+14);
    else if(period==='monthly')  d.setMonth(d.getMonth()+1);
    else if(period==='quarterly')d.setMonth(d.getMonth()+3);
    else if(period==='yearly')   d.setFullYear(d.getFullYear()+1);
    return d.toISOString().split('T')[0];
  };
  const sub=e=>{
    e.preventDefault();
    const amt=parseFloat(form.amount),rate=parseFloat(form.conversionRate)||1;
    const payload={
      ...form,
      id:Date.now(),timestamp:Date.now(),
      amount:amt,conversionRate:rate,
      amountINR:form.currency==='INR'?amt:amt*rate,
      version:5,
      // compute nextDueDate when recurring
      nextDueDate:form.isRecurring?(form.nextDueDate||calcNextDue(form.date,form.recurringPeriod)):'',
      // normalise split: only keep if actually splitting
      splitParts:form.splitWith?parseInt(form.splitParts)||2:1,
      splitWith:form.splitWith.trim(),
      // 8-5: category allocations
      categoryAllocations:form.useCatAlloc&&form.categoryAllocations&&Object.keys(form.categoryAllocations).length
        ? form.categoryAllocations : null,
    };
    // If allocations exist, set primary category to the one with highest %
    if(payload.categoryAllocations){
      const dom=Object.entries(payload.categoryAllocations).sort((a,b)=>b[1]-a[1])[0];
      if(dom) payload.category=dom[0];
    }
    if(initialData&&onEdit){
      onEdit({...payload, id:initialData.id, timestamp:initialData.timestamp||Date.now()});
    } else {
      onSubmit(payload);
    }
    onClose();
  };
  const tt=tag=>s('tags',form.tags.includes(tag)?form.tags.filter(t=>t!==tag):[...form.tags,tag]);
  const iF=form.currency!=='INR';
  const prev=form.amount&&iF?parseFloat(form.amount)*(parseFloat(form.conversionRate)||1):null;
    const rs=rateData?rateData.source:'none';
  const rb=rs==='live'?'rate-live':rs==='offline'?'rate-offline':rs==='cached'?'rate-cached':'rate-none';
  const rl=rs==='live'?'🟢 Live':rs==='offline'?'🔴 Offline':rs==='cached'?`🔵 Cached (${RM.age(rateData.ts)})`:'⚪ No data';
  const catColor=CATS[form.category]?.color||'#667eea';
  const previewColor=form.customColor||catColor;
  return(
    <div className="form-overlay" role="dialog" aria-modal="true" aria-labelledby="ef-title" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="form-modal">
        <h2 id="ef-title" style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{width:32,height:32,borderRadius:10,background:previewColor+'33',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:18}}>
            {CATS[form.category]?.icon||'📌'}
          </span>
          {initialData?'✏️ Edit Expense':'➕ Add Expense'}
        </h2>
        <form onSubmit={sub}>
          {/* ── Core ── */}
          <div className="form-row">
            <div className="form-group"><label>Description *</label><input value={form.description} onChange={e=>s('description',e.target.value)} required placeholder="What did you spend on?" autoFocus/></div>
            <div className="form-group"><label>Date *</label><input type="date" value={form.date} onChange={e=>s('date',e.target.value)} required/></div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Currency</label><CurrencySelect value={form.currency} onChange={onCC}/>
              {iF&&<span className={`rate-badge ${rb}`}>{rl}{lr&&' ⟳'}</span>}
            </div>
            <div className="form-group">
              <label>Amount *</label>
              <input type="number" step="0.01" min="0" value={form.amount} onChange={e=>s('amount',e.target.value)} required placeholder="0.00"/>
              {prev!==null&&<div className="currency-preview">≈ {(baseSym||'₹')+parseFloat(prev/(baseRate||1)).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2})} {baseCurrCode||'INR'}</div>}
            </div>
          </div>
          {iF&&<div className="form-group"><label>Rate: 1 {form.currency} = ? INR</label><input type="number" step="0.000001" min="0" value={form.conversionRate} onChange={e=>s('conversionRate',parseFloat(e.target.value)||0)}/></div>}

          {/* ── Category & Type ── */}
          <div className="form-row">
            <div className="form-group"><label>Category</label><select value={form.category} onChange={e=>{s('category',e.target.value);s('subcategory','');}}>{Object.keys(CATS).map(c=><option key={c} value={c}>{CATS[c].icon} {c}</option>)}</select></div>
            <div className="form-group"><label>Subcategory</label><select value={form.subcategory} onChange={e=>s('subcategory',e.target.value)}><option value="">-- None --</option>{(CATS[form.category]?.subs||[]).map(x=><option key={x} value={x}>{x}</option>)}</select></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label>Payment Method</label><select value={form.paymentMethod} onChange={e=>s('paymentMethod',e.target.value)}>{PAY_METHODS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
            <div className="form-group"><label>Expense Type</label><select value={form.expenseType} onChange={e=>s('expenseType',e.target.value)}>{EXP_TYPES.map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</select></div>
          </div>
          {form.category==='Food'&&<div className="form-group"><label>Dining App</label><select value={form.diningApp} onChange={e=>s('diningApp',e.target.value)}>{DINING_APPS.map(a=><option key={a} value={a}>{a||'-- None --'}</option>)}</select></div>}
          {form.paymentMethod!=='Cash'&&<div className="form-group"><label>Payment Reference</label><input value={form.paymentDescription} onChange={e=>s('paymentDescription',e.target.value)} placeholder="Card last 4 digits, UPI ID, txn ID…"/></div>}
          {form.category==='Food'&&<div className="form-group"><label>Grocery Tags</label><div className="tags-container">{GROCERY_TAGS.map(tag=><button type="button" key={tag} className={`tag-btn ${form.tags.includes(tag)?'selected':''}`} onClick={()=>tt(tag)}>{tag}</button>)}</div></div>}

          {/* ── 3-7: Receipt Reference ── */}
          <div className="section-divider">📎 Receipt & Notes</div>
          <div className="form-row">
            <div className="form-group">
              <label>Receipt Ref / Order ID</label>
              <input value={form.receiptRef} onChange={e=>s('receiptRef',e.target.value)} placeholder="Order #, receipt number, URL…"/>
            </div>
            <div className="form-group">
              <label>Notes</label>
              <input value={form.notes} onChange={e=>s('notes',e.target.value)} placeholder="Extra details…"/>
            </div>
          </div>

          {/* ── 3-6: Split Expense ── */}
          <div className="section-divider">👥 Split Expense</div>
          <div className="form-row">
            <div className="form-group">
              <label>Split With (names)</label>
              <input value={form.splitWith} onChange={e=>s('splitWith',e.target.value)} placeholder="Alice, Bob… (leave blank if no split)"/>
            </div>
            {form.splitWith&&<div className="form-group">
              <label>Total Parts (your share = 1/{form.splitParts})</label>
              <input type="number" min="2" max="20" value={form.splitParts} onChange={e=>s('splitParts',parseInt(e.target.value)||2)}/>
              {form.amount&&<div className="currency-preview">Your share: {fmtINR(parseFloat(form.amount)/(parseInt(form.splitParts)||2))}</div>}
            </div>}
          </div>

          {/* ── 3-5: Recurring ── */}
          <div className="section-divider">🔄 Recurring</div>
          <div className="form-row" style={{alignItems:'center'}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                <input type="checkbox" checked={form.isRecurring} onChange={e=>s('isRecurring',e.target.checked)} style={{width:'auto',cursor:'pointer'}}/>
                This is a recurring expense
              </label>
            </div>
            {form.isRecurring&&<div className="form-group" style={{marginBottom:0}}>
              <label>Repeats</label>
              <select value={form.recurringPeriod} onChange={e=>{s('recurringPeriod',e.target.value);s('nextDueDate',calcNextDue(form.date,e.target.value));}}>
                {RECURRING_PERIODS.map(p=><option key={p.val} value={p.val}>{p.label}</option>)}
              </select>
            </div>}
          </div>
          {form.isRecurring&&<div className="form-group" style={{marginTop:8}}>
            <label>Next Due Date (auto-calculated, adjustable)</label>
            <input type="date" value={form.nextDueDate||calcNextDue(form.date,form.recurringPeriod)} onChange={e=>s('nextDueDate',e.target.value)}/>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>The app will automatically add this expense on the next due date when you open it.</div>
          </div>}

          {/* ── 3-11: Custom Colour Palette ── */}
          <div className="section-divider">🎨 Colour</div>
          <div className="form-group">
            <label>Custom Colour <span style={{fontWeight:400,color:'var(--text3)'}}>— overrides category colour on the list</span></label>
            <div className="palette-grid">
              <div className={`palette-swatch none ${!form.customColor?'active':''}`} onClick={()=>s('customColor',null)} title="Use category colour">✕</div>
              {CC.map(c=>(
                <div key={c} className={`palette-swatch ${form.customColor===c?'active':''}`}
                  style={{background:c}} onClick={()=>s('customColor',c)} title={c}/>
              ))}
            </div>
          </div>


          {/* ── 8-5: Category Allocation Split ── */}
          <div className="section-divider">📁 Split Across Categories</div>
          <div style={{marginBottom:8}}>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13}}>
              <input type="checkbox" checked={form.useCatAlloc||false}
                onChange={e=>s('useCatAlloc',e.target.checked)}
                style={{width:'auto',cursor:'pointer'}}/>
              Allocate this expense across multiple categories
            </label>
            {form.useCatAlloc&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
              Enter the % for each category (must total 100%). Analytics will split the amount proportionally.
            </div>}
          </div>
          {form.useCatAlloc&&(()=>{
            const allocs = form.categoryAllocations||{};
            const total  = Object.values(allocs).reduce((s,v)=>s+(parseFloat(v)||0),0);
            const tcls   = total===100?'ok':total>100?'over':'under';
            const updateAlloc = (cat,val) => {
              const next={...allocs};
              const n=parseFloat(val)||0;
              if(n===0) delete next[cat]; else next[cat]=n;
              s('categoryAllocations',next);
            };
            return(
              <>
                <div className="cat-alloc-grid">
                  {Object.keys(CATS).map(cat=>{
                    const v=allocs[cat]||'';
                    return(
                      <div key={cat} className={'cat-alloc-row'+(v?' has-value':'')}>
                        <span className="cat-icon">{CATS[cat].icon}</span>
                        <span className="cat-name">{cat}</span>
                        <input type="number" min="0" max="100" step="1"
                          className="pct-input"
                          value={v}
                          onChange={e=>updateAlloc(cat,e.target.value)}
                          placeholder="0"/>
                        <span className="pct-sym">%</span>
                      </div>
                    );
                  })}
                </div>
                <div className={`cat-alloc-total ${tcls}`}>
                  Total: {total.toFixed(0)}%
                  {tcls==='ok'&&' ✓'}
                  {tcls==='over'&&` — over by ${(total-100).toFixed(0)}%`}
                  {tcls==='under'&&total>0&&` — ${(100-total).toFixed(0)}% remaining`}
                </div>
              </>
            );
          })()}

          <div className="form-actions">
            <button type="button" className="btn" style={{background:'var(--surface2)',color:'var(--text2)'}} onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-success" style={{background:previewColor}}>{initialData?'Update Expense':'Save Expense'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

        <button className="delete-btn" onClick={()=>onDelete(item.id)} title="Delete income" aria-label={"Delete "+item.description}>✕</button>
      </div>
    </div>
  );
});

// ═══════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════
function App(){
  const [data,setData]=useState(()=>loadData());
  const [tab,setTab]=useState('overview');
  const [showEF,setShowEF]=useState(false);
  const [showIF,setShowIF]=useState(false);
  const [editExpTarget,setEditExpTarget]=useState(null); // expense being edited
  const [editIncTarget,setEditIncTarget]=useState(null); // income being edited
  const [rateData,setRateData]=useState(null);
  const [rateFetching,setRateFetching]=useState(false);
  const [delTarget,setDelTarget]=useState(null);
  const [dark,setDark]=useState(()=>localStorage.getItem('et_v5_dark')==='1');
  const [colorblind,setColorblind]=useState(()=>localStorage.getItem('et_v5_cb')==='1'); // 14-6
  const [baseCurrency,setBaseCurrency]=useState(()=>localStorage.getItem('et_v5_base')||'INR');
  const [recurringAdded,setRecurringAdded]=useState(0); // count of auto-generated recurring expenses

  // ── Expense filters ──
  const [expSearch,setExpSearch]=useState('');
  const [expFilters,setExpFilters]=useState([
    {key:'payment',label:'Payment',value:'All'},
    {key:'currency',label:'Currency',value:'All'},
  ]);
  const [expMonth,setExpMonth]=useState('');
  // Phase 6 advanced filters
  const [expCategories,setExpCategories]=useState([]); // [] = All; array of selected category names
  const [expDateFrom,setExpDateFrom]=useState('');
  const [expDateTo,setExpDateTo]=useState('');
  const [expAmtMin,setExpAmtMin]=useState('');
  const [expAmtMax,setExpAmtMax]=useState('');

  // ── Income filters ──
  const [incSearch,setIncSearch]=useState('');
  const [incFilters,setIncFilters]=useState([
    {key:'source',label:'Source',value:'All'},
    {key:'currency',label:'Currency',value:'All'},
  ]);
  const [incMonth,setIncMonth]=useState('');
  // Phase 6 advanced filters for income
  const [incDateFrom,setIncDateFrom]=useState('');
  const [incDateTo,setIncDateTo]=useState('');
  const [incAmtMin,setIncAmtMin]=useState('');
  const [incAmtMax,setIncAmtMax]=useState('');

  // ── Budget state (Phase 7) ──────────────────────────────────────────
  // Budgets live inside data._budgets so they export/import with the data file.
  // Initialised from _v4Settings.dailyBudget if present (7-1).
  const budgets = useMemo(()=>{
    const b = data._budgets || {};
    // Seed daily budget from v4 import if not yet set
    if (!b.daily && data._v4Settings?.dailyBudget)
      return { daily: parseFloat(data._v4Settings.dailyBudget)||0, weekly:0, monthly:0, categories:{}, ...b };
    return { daily:0, weekly:0, monthly:0, categories:{}, ...b };
  },[data]);

  const saveBudgets = nb => persist({ ...data, _budgets: nb });

  // ── Toast state (Phase 7-6/7/8) ──────────────────────────────────────
  const [toasts, setToasts] = useState([]);
  const _firedToasts = useRef(new Set()); // tracks threshold keys already fired this session

  const addToast = (kind, icon, title, msg, duration=6000) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, kind, icon, title, msg }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id===id ? {...t, exiting:true} : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id!==id)), 220);
    }, duration);
  };
  const dismissToast = id => {
    setToasts(prev => prev.map(t => t.id===id ? {...t, exiting:true} : t));
    setTimeout(() => setToasts(prev => prev.filter(t => t.id!==id)), 220);
  };

  // ── Debounced search strings (Phase 6-11) ──────────────────────────
  const debouncedExpSearch=useDebounce(expSearch,300);
  const debouncedIncSearch=useDebounce(incSearch,300);

  const expenses=data.expenses||[];
  const income=data.income||[];

  // ── Base-currency helpers ────────────────────────────────────────────
  const baseCurrInfo = CM[baseCurrency] || CM['INR'];
  const baseSym = baseCurrInfo.symbol;
  const _baseRate = rateData?.rates?.[baseCurrency] || 1;
  // Convert an expense/income object to the display base currency
  const toBase = e => { if(!e) return 0; const inr=toINR(e); return baseCurrency==='INR'?inr:inr/_baseRate; };
  // Format a number in base currency
  const fmtBase = n => { if(isNaN(n)||n==null) return baseSym+'0'; const v=parseFloat(n); return (v<0?'-':'')+baseSym+Math.abs(v).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2}); };
  // Convenience: convert an already-computed INR amount to base and format
  const fmtBaseFromINR = n => fmtBase(n/_baseRate);

  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);localStorage.setItem('et_v5_dark',dark?'1':'0');},[dark]);
  useEffect(()=>{document.documentElement.classList.toggle('colorblind',colorblind);localStorage.setItem('et_v5_cb',colorblind?'1':'0');},[colorblind]); // 14-6
  useEffect(()=>{localStorage.setItem('et_v5_base',baseCurrency);},[baseCurrency]);
  useEffect(()=>{RM.get(baseCurrency).then(rd=>setRateData(rd));},[baseCurrency]);

  // ── 14-4: Recurring expense reminders — fire toasts for due soon + upcoming section ──
  const [upcomingRecurring, setUpcomingRecurring] = useState([]); // for Overview banner
  useEffect(()=>{
    const today=new Date().toISOString().split('T')[0];
    const templates=expenses.filter(e=>e.isRecurring&&e.nextDueDate);
    const upcoming=[];
    templates.forEach(tmpl=>{
      const due=tmpl.nextDueDate;
      const daysUntil=Math.ceil((new Date(due+'T12:00:00')-new Date(today+'T12:00:00'))/864e5);
      if(daysUntil<=0) return; // already auto-added on mount
      if(daysUntil<=7) upcoming.push({...tmpl,daysUntil});
      // Fire a reminder toast for each upcoming within 3 days (once per session)
      if(daysUntil<=3){
        const key=`recurring-remind-${tmpl.id}-${due}`;
        if(!_firedToasts.current.has(key)){
          _firedToasts.current.add(key);
          const cat=CATS[tmpl.category]||CATS['Other'];
          const urgency=daysUntil===0?'due today':daysUntil===1?'due tomorrow':`due in ${daysUntil} days`;
          addToast(
            daysUntil<=1?'warn':'info',
            cat.icon||'🔄',
            `🔄 Recurring: ${tmpl.description}`,
            `${fmtINR(toINR(tmpl))} — ${urgency} (${due})`,
            daysUntil<=1?8000:6000
          );
        }
      }
    });
    // Sort by daysUntil ascending, cap at 5 entries for banner
    upcoming.sort((a,b)=>a.daysUntil-b.daysUntil);
    setUpcomingRecurring(upcoming.slice(0,5));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);  // once on mount

  // ── Auto-generate recurring expenses that are due ──────────────────
  useEffect(()=>{
    const today=new Date().toISOString().split('T')[0];
    const templates=expenses.filter(e=>e.isRecurring&&e.nextDueDate&&e.nextDueDate<=today);
    if(!templates.length)return;

    // Build a helper to advance nextDueDate by one period
    const advanceDue=(date,period)=>{
      const d=new Date(date);
      if(period==='daily')    d.setDate(d.getDate()+1);
      else if(period==='weekly')   d.setDate(d.getDate()+7);
      else if(period==='biweekly') d.setDate(d.getDate()+14);
      else if(period==='monthly')  d.setMonth(d.getMonth()+1);
      else if(period==='quarterly')d.setMonth(d.getMonth()+3);
      else if(period==='yearly')   d.setFullYear(d.getFullYear()+1);
      return d.toISOString().split('T')[0];
    };

    const ctx=makeDedupContext(expenses);
    const newExps=[];
    const updatedTemplates=[];

    templates.forEach(tmpl=>{
      // Create the new expense for today (not recurring itself — it's a generated copy)
      const generated=makeV5Expense({
        ...tmpl,
        id:undefined,         // force new stable id
        _fp:undefined,        // force new fingerprint
        date:tmpl.nextDueDate,
        timestamp:Date.now(),
        isRecurring:false,    // generated copy is not a template
        nextDueDate:'',
        migratedFrom:'recurring-auto',
      },'recurring-auto');

      if(!ctx.isDuplicate(generated)){
        ctx.register(generated);
        newExps.push(generated);
      }
      // Advance the template's nextDueDate
      updatedTemplates.push({...tmpl, nextDueDate:advanceDue(tmpl.nextDueDate,tmpl.recurringPeriod||'monthly')});
    });

    if(!newExps.length&&!updatedTemplates.length)return;

    // Merge: replace updated templates + add generated expenses
    const templateIds=new Set(updatedTemplates.map(t=>t.id));
    const mergedExps=[
      ...expenses.map(e=>templateIds.has(e.id)?updatedTemplates.find(u=>u.id===e.id):e),
      ...newExps,
    ];
    persist({...data,expenses:mergedExps});
    if(newExps.length)setRecurringAdded(newExps.length);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);  // runs once on mount — intentional
  useEffect(()=>{
    const TABS=['overview','income','trends','insights','budgets','goals','exchange','settings'];
    const h=e=>{
      if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
      const n=parseInt(e.key);if(n>=1&&n<=TABS.length)setTab(TABS[n-1]);
      if(e.key==='n'||e.key==='N')setShowEF(true);
      if(e.key==='i'||e.key==='I')setShowIF(true);
      if(e.key==='d'||e.key==='D')setDark(m=>!m);
      if(e.key==='Escape'){setShowEF(false);setShowIF(false);setDelTarget(null);setConfirmAction(null);setToasts([]);setEditExpTarget(null);setEditIncTarget(null);}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  const persist=nd=>{setData(nd);saveData(nd);};

  // ── Dedup guard: never add an entry that already exists (by id or fingerprint) ──
  // ── Edit functions ──────────────────────────────────────
  const editExpense=updated=>{
    persist({...data, expenses:expenses.map(e=>e.id===updated.id?updated:e)});
  };
  const editIncome=updated=>{
    persist({...data, income:income.map(i=>i.id===updated.id?updated:i)});
  };

  const addExpense=exp=>{
    const ctx=makeDedupContext(expenses);
    // Ensure the new expense has a stable id and fingerprint
    const entry=makeV5Expense(exp,'manual');
    if(ctx.isDuplicate(entry))return; // silently skip true duplicate
    persist({...data,expenses:[entry,...expenses]});
  };
  const addIncome=inc=>{
    const ctx=makeDedupContext(income);
    const entry=makeV5Income(inc,'manual');
    if(ctx.isDuplicate(entry))return;
    persist({...data,income:[entry,...income]});
  };
  const deleteItem=React.useCallback(()=>{
    if(!delTarget)return;
    if(delTarget.type==='expense')persist({...data,expenses:expenses.filter(e=>e.id!==delTarget.id)});
    else persist({...data,income:income.filter(i=>i.id!==delTarget.id)});
    setDelTarget(null);
  },[delTarget,data,expenses,income]); // 14-9

  const refreshRates=async()=>{setRateFetching(true);try{const rd=await RM.fetchLive(baseCurrency);setRateData(rd);}catch(e){}setRateFetching(false);};

  // ── filter helpers ──
  const getFilter=(arr,key)=>arr.find(f=>f.key===key)?.value||'All';
  const setFilter=(arr,setArr,key,val)=>setArr(arr.map(f=>f.key===key?{...f,value:val}:f));

  // ──────────────────────────────────────────────────────
  // EXPENSE FILTERING — all Phase 6 filters applied
  // ──────────────────────────────────────────────────────
  const filteredExp = useMemo(()=>{
    return expenses.filter(e => {
      // 1. Full-text search (debounced — Phase 6-11)
      if (!matchesSearch(e, debouncedExpSearch)) return false;
      // 2. Multi-category filter (Phase 6-10)
      if (expCategories.length) {
        // 8-5: check both primary category and allocations
        const allCats=[e.category,...Object.keys(e.categoryAllocations||{})];
        if(!expCategories.some(c=>allCats.includes(c))) return false;
      }
      // 3. Payment method filter
      const pay = getFilter(expFilters,'payment');
      if (pay !== 'All' && (e.paymentMethod||'Cash') !== pay) return false;
      // 4. Currency filter
      const cur = getFilter(expFilters,'currency');
      if (cur !== 'All' && (e.currency||'INR') !== cur) return false;
      // 5. Month picker filter (existing)
      if (expMonth && !(e.date||'').startsWith(expMonth)) return false;
      // 6. Date range filter (Phase 6-8) — coexists with month picker
      if (expDateFrom && (e.date||'') < expDateFrom) return false;
      if (expDateTo   && (e.date||'') > expDateTo)   return false;
      // 7. Amount range filter (Phase 6-9)
      const amt = toINR(e);
      if (expAmtMin !== '' && !isNaN(parseFloat(expAmtMin)) && amt < parseFloat(expAmtMin)) return false;
      if (expAmtMax !== '' && !isNaN(parseFloat(expAmtMax)) && amt > parseFloat(expAmtMax)) return false;
      return true;
    });
  },[expenses, debouncedExpSearch, expFilters, expMonth,
     expCategories, expDateFrom, expDateTo, expAmtMin, expAmtMax]);

  // ──────────────────────────────────────────────────────
  // INCOME FILTERING — all Phase 6 filters applied
  // ──────────────────────────────────────────────────────
  const filteredInc = useMemo(()=>{
    return income.filter(i => {
      // 1. Debounced full-text search (Phase 6-11)
      if (!matchesSearch(i, debouncedIncSearch)) return false;
      // 2. Source filter
      const src = getFilter(incFilters,'source');
      if (src !== 'All' && (i.source||'Other') !== src) return false;
      // 3. Currency filter
      const cur = getFilter(incFilters,'currency');
      if (cur !== 'All' && (i.currency||'INR') !== cur) return false;
      // 4. Month filter
      if (incMonth && !(i.date||'').startsWith(incMonth)) return false;
      // 5. Date range filter (Phase 6-8)
      if (incDateFrom && (i.date||'') < incDateFrom) return false;
      if (incDateTo   && (i.date||'') > incDateTo)   return false;
      // 6. Amount range filter (Phase 6-9)
      const amt = toINR(i);
      if (incAmtMin !== '' && !isNaN(parseFloat(incAmtMin)) && amt < parseFloat(incAmtMin)) return false;
      if (incAmtMax !== '' && !isNaN(parseFloat(incAmtMax)) && amt > parseFloat(incAmtMax)) return false;
      return true;
    });
  },[income, debouncedIncSearch, incFilters, incMonth,
     incDateFrom, incDateTo, incAmtMin, incAmtMax]);

  const totalExpINR = useMemo(()=>filteredExp.reduce((s,e)=>s+toINR(e),0),[filteredExp]);
  const totalIncINR = useMemo(()=>filteredInc.reduce((s,i)=>s+toINR(i),0),[filteredInc]);
  const allExpINR   = useMemo(()=>expenses.reduce((s,e)=>s+toINR(e),0),[expenses]);
  const allIncINR   = useMemo(()=>income.reduce((s,i)=>s+toINR(i),0),[income]);
  const netSavings  = allIncINR - allExpINR;
  // Base-currency display totals (re-derived whenever _baseRate/baseCurrency changes)
  const totalExpBase = totalExpINR / _baseRate;
  const totalIncBase = totalIncINR / _baseRate;
  const allExpBase   = allExpINR   / _baseRate;
  const allIncBase   = allIncINR   / _baseRate;
  const netSavingsBase = allIncBase - allExpBase;

  // Currencies actually used (for filter dropdown)
  const usedExpCurrencies = useMemo(()=>[...new Set(expenses.map(e=>e.currency||'INR'))]  ,[expenses]);
  const usedIncCurrencies = useMemo(()=>[...new Set(income.map(i=>i.currency||'INR'))]    ,[income]);

  // ── Budget calculations (Phase 7) ────────────────────────────────────
  const todayStr = new Date().toISOString().split('T')[0];
  const weekStart = (()=>{
    const d = new Date(); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay()); // Sunday
    return d.toISOString().split('T')[0];
  })();
  const monthStr = todayStr.substring(0,7); // YYYY-MM

  const spentToday   = useMemo(()=>expenses.filter(e=>e.date===todayStr).reduce((s,e)=>s+toINR(e),0),[expenses,todayStr]);
  const spentWeek    = useMemo(()=>expenses.filter(e=>e.date>=weekStart&&e.date<=todayStr).reduce((s,e)=>s+toINR(e),0),[expenses,weekStart,todayStr]);
  const spentMonth   = useMemo(()=>expenses.filter(e=>(e.date||'').startsWith(monthStr)).reduce((s,e)=>s+toINR(e),0),[expenses,monthStr]);

  // ── Safe-to-Spend ──
  const stsSettings=useMemo(()=>data._sts||{},[data]);
  const stsSavingsGoalBase=stsSettings.savingsGoalAmt||0;
  const stsSavingsGoalINR=stsSavingsGoalBase*_baseRate;
  const currentMonthInc=useMemo(()=>income.filter(i=>(i.date||'').startsWith(monthStr)).reduce((s,i)=>s+toINR(i),0),[income,monthStr]);
  const currentMonthFixed=useMemo(()=>expenses.filter(e=>(e.date||'').startsWith(monthStr)&&e.expenseType==='fixed').reduce((s,e)=>s+toINR(e),0),[expenses,monthStr]);
  const {dailyAllowance,daysRemaining}=calculateSafeToSpend(currentMonthInc,currentMonthFixed,stsSavingsGoalINR,todayStr);
  const stsRatio=dailyAllowance>0?spentToday/dailyAllowance:0;
  const stsStatus=stsRatio>=1?'danger':stsRatio>=0.8?'warn':'ok';
  // ── Streak ──
  const streak=useStreak(expenses);

  const spentByCatMonth = useMemo(()=>{
    const c={};
    expenses.filter(e=>(e.date||'').startsWith(monthStr)).forEach(e=>{
      c[e.category]=(c[e.category]||0)+toINR(e);
    });
    return c;
  },[expenses,monthStr]);

  // ── Toast threshold checks (7-6, 7-7, 7-8) ────────────────────────────
  useEffect(()=>{
    const checks=[
      { key:'daily-50',  spent:spentToday, budget:budgets.daily,   pct:50,  kind:'warn',   icon:'⚡', label:'Daily' },
      { key:'daily-80',  spent:spentToday, budget:budgets.daily,   pct:80,  kind:'warn',   icon:'🔔', label:'Daily' },
      { key:'daily-100', spent:spentToday, budget:budgets.daily,   pct:100, kind:'danger',  icon:'🚨', label:'Daily' },
      { key:'week-50',   spent:spentWeek,  budget:budgets.weekly,  pct:50,  kind:'warn',   icon:'⚡', label:'Weekly' },
      { key:'week-80',   spent:spentWeek,  budget:budgets.weekly,  pct:80,  kind:'warn',   icon:'🔔', label:'Weekly' },
      { key:'week-100',  spent:spentWeek,  budget:budgets.weekly,  pct:100, kind:'danger',  icon:'🚨', label:'Weekly' },
      { key:'month-50',  spent:spentMonth, budget:budgets.monthly, pct:50,  kind:'warn',   icon:'⚡', label:'Monthly' },
      { key:'month-80',  spent:spentMonth, budget:budgets.monthly, pct:80,  kind:'warn',   icon:'🔔', label:'Monthly' },
      { key:'month-100', spent:spentMonth, budget:budgets.monthly, pct:100, kind:'danger',  icon:'🚨', label:'Monthly' },
    ];
    // Per-category threshold checks
    Object.entries(budgets.categories||{}).forEach(([cat,bgt])=>{
      if(!bgt) return;
      const spent=spentByCatMonth[cat]||0;
      ['50','80','100'].forEach((p,pi)=>{
        checks.push({
          key:`cat-${cat}-${p}`,
          spent,budget:bgt,pct:parseInt(p),
          kind:pi<2?'warn':'danger',
          icon:CATS[cat]?.icon||'📁',
          label:cat,
        });
      });
    });
    checks.forEach(({key,spent,budget,pct,kind,icon,label})=>{
      if(!budget||budget<=0) return;
      const actual=(spent/budget)*100;
      if(actual>=pct && !_firedToasts.current.has(key)){
        _firedToasts.current.add(key);
        const over=actual>=100;
        const title=over
          ? `${label} budget exceeded!`
          : `${label} budget ${pct}% reached`;
        const msg=over
          ? `Spent ${fmtINR(spent)} of ${fmtINR(budget)} budget`
          : `${fmtINR(spent)} spent — ${fmtINR(budget-spent)} remaining`;
        addToast(kind,icon,title,msg);
      }
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[spentToday,spentWeek,spentMonth,spentByCatMonth,budgets]);

  // ── Computation cache (Phase 4-8) ──────────────────────────────────
  // useRef cache persists heavy aggregations across renders without re-running
  // when unrelated state changes (e.g. tab switch, dark mode toggle)
  const _cache = React.useRef({});
  const cached = (key, deps, fn) => {
    const prev = _cache.current[key];
    const depsStr = JSON.stringify(deps);
    if (prev && prev.deps === depsStr) return prev.val;
    const val = fn();
    _cache.current[key] = { deps: depsStr, val };
    return val;
  };

  // Chart data from FILTERED expenses
  const catData = useMemo(()=>{
    const c={};
    filteredExp.forEach(e=>{
      const inr=toINR(e);
      if(e.categoryAllocations&&Object.keys(e.categoryAllocations).length){
        // 8-5: split across allocated categories proportionally
        const total=Object.values(e.categoryAllocations).reduce((s,v)=>s+(parseFloat(v)||0),0);
        if(total>0){
          Object.entries(e.categoryAllocations).forEach(([cat,pct])=>{
            c[cat]=(c[cat]||0)+inr*(parseFloat(pct)/total);
          });
          return;
        }
      }
      c[e.category]=(c[e.category]||0)+inr;
    });
    return Object.entries(c).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filteredExp]);

  const payData = useMemo(()=>{
    const p={};filteredExp.forEach(e=>{const k=e.paymentMethod||'Cash';p[k]=(p[k]||0)+toINR(e);});
    return Object.entries(p).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filteredExp]);

  // Dining app breakdown (4-4)
  const diningData = useMemo(()=>{
    const d={};
    filteredExp.filter(e=>e.diningApp&&e.category==='Food').forEach(e=>{
      const k=e.diningApp;d[k]=(d[k]||0)+toINR(e);
    });
    return Object.entries(d).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filteredExp]);

  // Grocery tags breakdown (4-3)
  const tagsData = useMemo(()=>{
    const t={};
    filteredExp.filter(e=>e.tags&&e.tags.length).forEach(e=>{
      e.tags.forEach(tag=>{t[tag]=(t[tag]||0)+toINR(e);});
    });
    return Object.entries(t).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filteredExp]);

  // Expense type breakdown
  const expTypeData = useMemo(()=>{
    const t={};
    filteredExp.forEach(e=>{const k=e.expenseType||'variable';t[k]=(t[k]||0)+toINR(e);});
    return Object.entries(t).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filteredExp]);

  const incSrcData = useMemo(()=>{
    const s={};filteredInc.forEach(i=>{const k=i.source||'Other';s[k]=(s[k]||0)+toINR(i);});

  },[income]);

  // All-months data (no slice) for full comparison table (13-3)
  const allMonthlyExp = useMemo(()=>{
    const m={};expenses.forEach(e=>{const k=(e.date||'').substring(0,7);if(k)m[k]=(m[k]||0)+toINR(e);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({label:k.substring(5),fullLabel:k,value:v}));
  },[expenses]);

  const allMonthlyInc = useMemo(()=>{

  const grouped    = useMemo(()=>byDate(filteredExp),[filteredExp]);

  const insights = useMemo(()=>{
    const res=[];

    // ── 1. Top category ──
    if(catData.length) res.push({title:'🏆 Top Expense Category',text:`${catData[0].label} leads at ${fmtINR(catData[0].value)} (${(catData[0].value/allExpINR*100).toFixed(0)}% of all spending).`});

    // ── 2. Savings rate ──
    if(allIncINR>0){
      const r=((allExpINR/allIncINR)*100).toFixed(0),s=allIncINR-allExpINR;
      res.push({title:'📊 Savings Rate',text:`You spent ${r}% of income. ${s>=0?'Saved '+fmtINR(s)+'! 🎉':'Overspent by '+fmtINR(Math.abs(s))+'. ⚠️'}`});
    }

    // ── 3. Peak day of week ──
    const dow=Array(7).fill(0);
    expenses.forEach(e=>{const d=new Date(e.date+'T12:00:00');if(!isNaN(d))dow[d.getDay()]+=toINR(e);});
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],pk=dow.indexOf(Math.max(...dow));
    if(dow[pk]>0) res.push({title:'📅 Peak Spend Day',text:`You spend most on ${DAYS[pk]}s (${fmtINR(dow[pk])} total, ${(dow[pk]/allExpINR*100).toFixed(0)}% of spend).`});

    // ── 4. Monthly trend ──
    if(monthlyExpData.length>=2){
      const last=monthlyExpData[monthlyExpData.length-1],prev=monthlyExpData[monthlyExpData.length-2];
      const pct=prev.value>0?Math.abs((last.value-prev.value)/prev.value*100).toFixed(0):0;
      const up=last.value>prev.value;
      res.push({title:'📈 Monthly Trend',text:up?`Spending up ${pct}% vs last month (+${fmtINR(last.value-prev.value)}).`:`Spending down ${pct}% vs last month. Saved ${fmtINR(prev.value-last.value)}! 🎉`});
    }

    // ── 5. Largest single transaction (anomaly detection) ──
    if(expenses.length>=3){
      const sorted=[...expenses].sort((a,b)=>toINR(b)-toINR(a));
      const big=sorted[0];
      const avg=allExpINR/expenses.length;
      const mult=(toINR(big)/avg).toFixed(1);
      if(mult>2) res.push({title:'🚨 Largest Transaction',text:`"${big.description}" on ${big.date} — ${fmtINR(toINR(big))}, which is ${mult}× your average expense. This looks like a significant spend.`});
    }

    // ── 6. Average daily spend ──
    if(expenses.length>=5){
      const dates=[...new Set(expenses.map(e=>e.date))];
      const avgDay=allExpINR/Math.max(dates.length,1);
      res.push({title:'📉 Average Daily Spend',text:`${fmtINR(avgDay)}/day across ${dates.length} active days. Monthly run-rate: ~${fmtINR(avgDay*30)}.`});
    }

    // ── 7. Multi-currency ──
    const foreign=expenses.filter(e=>e.currency&&e.currency!=='INR');
    if(foreign.length){
      const curs=[...new Set(foreign.map(e=>e.currency))];
      res.push({title:'💱 Multi-Currency',text:`${foreign.length} foreign expenses in: ${curs.map(c=>(CM[c]?.flag||'')+' '+c).join(', ')}.`});
    }

    // ── 8. Recurring expenses summary ──
    const recur=expenses.filter(e=>e.isRecurring);
    if(recur.length) res.push({title:'🔄 Recurring Expenses',text:`${recur.length} active recurring expense template${recur.length>1?'s':''}. Combined value: ${fmtINR(recur.reduce((s,e)=>s+toINR(e),0))}.`});

    // ── 9. Split expenses summary ──
    const splits=expenses.filter(e=>e.splitWith&&e.splitParts>1);
    if(splits.length){
      const shareTotal=splits.reduce((s,e)=>s+toINR(e)/e.splitParts,0);
      res.push({title:'👥 Split Expenses',text:`${splits.length} split expense${splits.length>1?'s':''}. Your total share: ${fmtINR(shareTotal)} (full amount: ${fmtINR(splits.reduce((s,e)=>s+toINR(e),0))}).`});
    }

    // ── 10. Fixed vs variable ──
    const fixed=expenses.filter(e=>e.expenseType==='fixed');
    const fixedTotal=fixed.reduce((s,e)=>s+toINR(e),0);
    if(fixed.length&&allExpINR>0) res.push({title:'📌 Fixed vs Variable',text:`${fixed.length} fixed expenses (${(fixedTotal/allExpINR*100).toFixed(0)}% of total = ${fmtINR(fixedTotal)}). The rest is variable spending.`});

    // ── 11. Weekend vs weekday spending pattern (13-6) ──
    if(expenses.length>=10){
      const weekend=expenses.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d===0||d===6;});
      const weekday=expenses.filter(e=>{const d=new Date(e.date+'T12:00:00').getDay();return d>=1&&d<=5;});
      const wkndTotal=weekend.reduce((s,e)=>s+toINR(e),0);
      const wkdyTotal=weekday.reduce((s,e)=>s+toINR(e),0);
      const wkndDays=new Set(weekend.map(e=>e.date)).size||1;
      const wkdyDays=new Set(weekday.map(e=>e.date)).size||1;
      const wkndAvg=wkndTotal/wkndDays,wkdyAvg=wkdyTotal/wkdyDays;
      const heavier=wkndAvg>wkdyAvg?'weekends':'weekdays';
      const ratio=(Math.max(wkndAvg,wkdyAvg)/Math.min(wkndAvg,wkdyAvg)||1).toFixed(1);
      res.push({title:'🗓️ Weekend vs Weekday',badge:null,text:`You spend ${ratio}× more on ${heavier}. Weekend avg: ${fmtINR(wkndAvg)}/day, weekday avg: ${fmtINR(wkdyAvg)}/day.`});
    }

    // ── 12. Category month-over-month trend (biggest grower / biggest saver) (13-6) ──
    if(allMonthlyExp.length>=2){
      const lastMo=allMonthlyExp[allMonthlyExp.length-1].fullLabel;
      const prevMo=allMonthlyExp[allMonthlyExp.length-2].fullLabel;
      const catLast={},catPrev={};
      expenses.filter(e=>e.date?.startsWith(lastMo)).forEach(e=>{ catLast[e.category]=(catLast[e.category]||0)+toINR(e); });
      expenses.filter(e=>e.date?.startsWith(prevMo)).forEach(e=>{ catPrev[e.category]=(catPrev[e.category]||0)+toINR(e); });
      const allCats=[...new Set([...Object.keys(catLast),...Object.keys(catPrev)])];
      const deltas=allCats.map(c=>({cat:c,delta:(catLast[c]||0)-(catPrev[c]||0)}));
      deltas.sort((a,b)=>b.delta-a.delta);
      const biggest=deltas[0],biggest_neg=deltas[deltas.length-1];
      const parts=[];
      if(biggest&&biggest.delta>100) parts.push(`📈 ${biggest.cat} up ${fmtINR(biggest.delta)}`);
      if(biggest_neg&&biggest_neg.delta<-100) parts.push(`📉 ${biggest_neg.cat} down ${fmtINR(Math.abs(biggest_neg.delta))}`);
      if(parts.length) res.push({title:'🔀 Category Trend (MoM)',text:`Comparing ${prevMo} → ${lastMo}: ${parts.join(' · ')}.`});
    }

    // ── 13. Spending streak — longest consecutive active days (13-6) ──
    if(expenses.length>=5){
      const dateset=new Set(expenses.map(e=>e.date));
      const sorted=[...dateset].sort();
      let maxStreak=1,cur=1,streakEnd=sorted[0];
      for(let i=1;i<sorted.length;i++){
        const prev=new Date(sorted[i-1]+'T12:00:00');
        const curr=new Date(sorted[i]+'T12:00:00');
        const diff=Math.round((curr-prev)/864e5);
        if(diff===1){cur++;if(cur>maxStreak){maxStreak=cur;streakEnd=sorted[i];}}
        else cur=1;
      }
      if(maxStreak>=3) res.push({title:'🔥 Longest Spending Streak',text:`${maxStreak} consecutive days ending ${streakEnd}. You logged expenses every single day during this streak.`});
    }

    // ── 14. Best and worst month by savings rate (13-6) ──
    if(allMonthlyExp.length>=3&&allMonthlyInc){
      const monthStats=allMonthlyExp.map(m=>{
        const inc=allMonthlyInc?.find?.(x=>x.fullLabel===m.fullLabel)?.value||0;
        const savingsRate=inc>0?((inc-m.value)/inc*100):null;
        return{...m,inc,savingsRate};
      }).filter(m=>m.savingsRate!==null);
      if(monthStats.length>=2){
        monthStats.sort((a,b)=>b.savingsRate-a.savingsRate);
        const best=monthStats[0],worst=monthStats[monthStats.length-1];
        res.push({title:'🏅 Best & Worst Month (Savings)',text:`Best: ${best.fullLabel} with ${best.savingsRate.toFixed(0)}% saved (${fmtINR(best.inc-best.value)}). Worst: ${worst.fullLabel} with ${worst.savingsRate.toFixed(0)}% saved.`});
      }
    }

    // ── 15. Category concentration risk (13-6) ──
    if(catData.length>=3&&allExpINR>0){
      const top=catData[0],top2pct=(catData[0].value+catData[1].value)/allExpINR*100;
      if(top2pct>60) res.push({title:'⚠️ Spending Concentration',badge:'warn',text:`${top2pct.toFixed(0)}% of all spending is in just 2 categories (${catData[0].label} + ${catData[1].label}). Consider reviewing if this is intentional.`});
    }

    // ── 16. Income consistency (13-6) ──
    if(allMonthlyInc&&allMonthlyInc.length>=3){
      const incVals=allMonthlyInc.map(m=>m.value);
      const avgInc=incVals.reduce((s,v)=>s+v,0)/incVals.length;
      const variance=incVals.reduce((s,v)=>s+Math.pow(v-avgInc,2),0)/incVals.length;
      const cv=(Math.sqrt(variance)/avgInc*100).toFixed(0);
      const consistency=cv<20?'very consistent':cv<40?'moderately consistent':'variable';
      res.push({title:'💵 Income Consistency',text:`Your monthly income is ${consistency} (coefficient of variation: ${cv}%). Average: ${fmtINR(avgInc)}/month across ${allMonthlyInc.length} months.`});
    }

    return res;
  },[catData,expenses,monthlyExpData,allMonthlyExp,allMonthlyInc,allIncINR,allExpINR]);

  const [importReport, setImportReport] = useState(null);

            <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:'var(--text)'}}>

            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {upcomingRecurring.map(r=>{
                const urgency=r.daysUntil===1?'tomorrow':`in ${r.daysUntil}d`;
                const color=r.daysUntil<=1?'#ef4444':r.daysUntil<=3?'#f59e0b':'#667eea';
                return(
                  <span key={r.id} style={{
                    padding:'4px 10px',borderRadius:99,fontSize:12,fontWeight:600,
                    background:color+'18',color,border:`1px solid ${color}40`,
                    display:'inline-flex',alignItems:'center',gap:4,
                  }}>
                    {CATS[r.category]?.icon||'🔄'} {r.description}
                    <span style={{fontWeight:400,opacity:.8}}>· {urgency} · {fmtINR(toINR(r))}</span>
                  </span>
                );
              })}
            </div>
          </div>
          <button onClick={()=>setUpcomingRecurring([])}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'var(--text3)',lineHeight:1}}

        </div>

      {/* ── IMPORT REPORT BANNER ── */}
      {importReport&&(
        <div style={{
          background: importReport.error ? '#fee2e2' : '#f0fdf4',
          border: `1px solid ${importReport.error ? '#fca5a5' : '#86efac'}`,

          display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12,
        }}>
          <div>
            <div style={{fontWeight:700,fontSize:13,color: importReport.error?'#991b1b':'#15803d',marginBottom:4}}>

            <pre style={{fontSize:11,color:'#374151',margin:0,whiteSpace:'pre-wrap',lineHeight:1.6}}>{importReport.details}</pre>
          </div>
          <button onClick={()=>setImportReport(null)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#6b7280',flexShrink:0}}>✕</button>

          <FilterBar
            search={expSearch}
            onSearch={setExpSearch}
            filters={expFilters}
            onFilterChange={(key,val)=>setFilter(expFilters,setExpFilters,key,val)}
            onClear={clearExpFilters}
            categories={true}
            paymentMethods={true}
            currencies={usedExpCurrencies}
            showMonth={true}
            month={expMonth}
            onMonthChange={setExpMonth}
            placeholder="🔍 Search description, category, notes, tags, payment..."
            selectedCategories={expCategories}
            onToggleCategory={toggleExpCategory}
            dateFrom={expDateFrom}    onDateFromChange={setExpDateFrom}
            dateTo={expDateTo}        onDateToChange={setExpDateTo}
            amtMin={expAmtMin}        onAmtMinChange={setExpAmtMin}
            amtMax={expAmtMax}        onAmtMaxChange={setExpAmtMax}
            baseSym={baseSym}         baseCurrCode={baseCurrency}
          />

          {/* Result count */}
          {hasExpFilters && (
            <div className="results-info">
              {filteredExp.length === 0
                ? '⚠️ No expenses match your filters'
                : `Showing ${filteredExp.length} of ${expenses.length} expenses · ${fmtBase(totalExpBase)} total`}
            </div>
          )}

          {filteredExp.length>0&&(
            <div className="chart-container">
              <div className="chart-card"><div className="chart-title">By Category</div><PieChart data={catData} fmt={fmtBaseFromINR}/></div>
              <div className="chart-card"><div className="chart-title">By Payment Method</div><PieChart data={payData} fmt={fmtBaseFromINR}/></div>
            </div>
          )}

          {grouped.length===0?(

            <div key={date} className="date-group">
              <div className="date-group-header">
                <span>{new Date(date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>
                <span>{fmtBase(items.reduce((s,e)=>s+toBase(e),0))}</span>

              {items.map(e=><ExpItem key={e.id} item={e} onDelete={id=>setDelTarget({id,type:'expense'})} onEdit={e=>{setEditExpTarget(e);setShowEF(true);}}/>)}
            </div>
          ))}
        </main>

      {/* ══════════════════════════════════════════════════
          INCOME TAB
      ══════════════════════════════════════════════════ */}
      {tab==='income'&&(
        <>
          <div className="summary-grid">
            <div className="summary-card inc"><label>Total Income (all)</label><div className="amount" style={{color:'#10b981'}}>{fmtBase(allIncBase)}</div></div>

            <div className="summary-card sav"><label>Net Savings</label><div className="amount" style={{color:netSavingsBase>=0?'#f59e0b':'#ef4444'}}>{netSavingsBase>=0?'+':''}{fmtBase(netSavingsBase)}</div></div>
            <div className="summary-card"><label>Showing</label><div className="amount">{filteredInc.length} / {income.length}</div></div>
          </div>

          <FilterBar
            search={incSearch}
            onSearch={setIncSearch}
            filters={incFilters}
            onFilterChange={(key,val)=>setFilter(incFilters,setIncFilters,key,val)}
            onClear={clearIncFilters}
            currencies={usedIncCurrencies}
            showMonth={true}
            month={incMonth}
            onMonthChange={setIncMonth}
            placeholder="🔍 Search income description, source, notes..."
            dateFrom={incDateFrom}    onDateFromChange={setIncDateFrom}
            dateTo={incDateTo}        onDateToChange={setIncDateTo}
            amtMin={incAmtMin}        onAmtMinChange={setIncAmtMin}
            amtMax={incAmtMax}        onAmtMaxChange={setIncAmtMax}

            </div>
          )}

            <button className="btn btn-income btn-sm" onClick={()=>setShowIF(true)}>💵 Add Income</button>
          </div>

          {groupedInc.length===0?(

              <div className="empty-state"><div className="icon">💵</div><h3>No income recorded yet</h3><p>Press <strong>I</strong> or click "Add Income" to track earnings</p></div>
            ):(
              <div className="no-results"><div className="nr-icon">🔍</div><p>No income matches your filters.</p><button className="btn btn-primary btn-sm" style={{marginTop:12}} onClick={clearIncFilters}>Clear filters</button></div>
            )
          ):groupedInc.map(([date,items])=>(
            <div key={date} className="date-group">
              <div className="date-group-header">
                <span>{new Date(date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>
                <span style={{color:'#10b981'}}>+{fmtINR(items.reduce((s,i)=>s+toINR(i),0))}</span>
              </div>
              {items.map(i=><IncItem key={i.id} item={i} onDelete={id=>setDelTarget({id,type:'income'})} onEdit={i=>{setEditIncTarget(i);setShowIF(true);}}/>)}
            </div>
          ))}
        </>
      )}

      {/* ══════════════════════════════════════════════════
          TRENDS TAB  (monthly + yearly side-by-side)
      ══════════════════════════════════════════════════ */}
      {tab==='trends'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(500px, 1fr))',gap:20}}>
          {/* ── LEFT: Monthly ── */}
          <div>
            <div className="card"><div style={{fontWeight:600,marginBottom:12}}>📅 Monthly Spending Trend</div><LineChart data={monthlyExpData} fmt={fmtBaseFromINR}/></div>
            <div className="chart-container">
              <div className="chart-card">
                <div className="chart-title">Category Breakdown</div>
                <PieChart data={catData.map((d,i)=>({...d,color:CATS[d.label]?.color||CC[i%CC.length]}))} fmt={fmtBaseFromINR}/>
              </div>
              <div className="chart-card">
                <div className="chart-title">Payment Breakdown</div>
                <PieChart data={payData} fmt={fmtBaseFromINR}/>
              </div>
            </div>
            {catData.length>0&&(
              <div className="card">
                <div style={{fontWeight:600,marginBottom:12}}>📋 Category Bars</div>
                <BarChart data={catData.map(d=>({...d,icon:CATS[d.label]?.icon||''}))} colorFn={d=>CATS[d.label]?.color||'#667eea'} fmt={fmtBaseFromINR}/>
              </div>
            )}
            <div className="card">
              <div className="comparison-header">
                <span className="comparison-header-title">📅 Month-by-Month Comparison</span>
                <span className="comparison-legend">
                  <span><span style={{color:'#10b981'}}>↓</span> expense decrease = good</span>
                  <span><span style={{color:'#ef4444'}}>↑</span> expense increase</span>
                </span>
              </div>
              <table>
                <thead><tr>
                  <th>Month</th>
                  <th style={{textAlign:'right'}}>Expenses</th>
                  <th className="delta-col">vs Prev Mo</th>
                  <th style={{textAlign:'right'}}>Income</th>
                  <th style={{textAlign:'right'}}>Saved</th>
                  <th style={{textAlign:'right'}}>Entries</th>
                </tr></thead>
                <tbody>{(()=>{
                  const rows=allMonthlyExp.slice().reverse();
                  return rows.map(({fullLabel,value},i)=>{
                    const prevVal=rows[i+1]?.value;
                    const inc=allMonthlyInc.find(m=>m.fullLabel===fullLabel)?.value||0;
                    const saved=inc-value;
                    const cnt=expenses.filter(e=>e.date?.startsWith(fullLabel)).length;
                    let delta=null;
                    if(prevVal!=null&&prevVal>0){
                      const pct=((value-prevVal)/prevVal*100);
                      const cls=pct>5?'delta-up':pct<-5?'delta-down':'delta-flat';
                      const arrow=pct>5?'↑':pct<-5?'↓':'–';
                      delta=<span className={cls}>{arrow}{Math.abs(pct).toFixed(0)}%</span>;
                    }
                    const isCurrentMonth=fullLabel===new Date().toISOString().substring(0,7);
                    return(
                      <tr key={i} style={isCurrentMonth?{background:'rgba(102,126,234,.06)'}:{}}>
                        <td style={{fontWeight:isCurrentMonth?700:400}}>
                          {fullLabel}{isCurrentMonth&&<span className="insight-badge new">now</span>}
                        </td>
                        <td style={{textAlign:'right',color:'#ef4444',fontWeight:600}}>{fmtBaseFromINR(value)}</td>
                        <td className="delta-col">{delta||<span className="delta-flat">—</span>}</td>
                        <td style={{textAlign:'right',color:'#10b981',fontWeight:600}}>{inc?fmtBaseFromINR(inc):'—'}</td>
                        <td style={{textAlign:'right',fontWeight:600,color:saved>=0?'#f59e0b':'#ef4444'}}>{inc?(saved>=0?'+':'')+fmtBaseFromINR(saved):'—'}</td>
                        <td style={{textAlign:'right',color:'var(--text3)'}}>{cnt}</td>
                      </tr>
                    );
                  });
                })()}</tbody>
              </table>
            </div>
          </div>
          {/* ── RIGHT: Yearly ── */}
          <div>
            <div className="card"><div style={{fontWeight:600,marginBottom:12}}>📆 Year-over-Year Spending</div><LineChart data={yearlyData} fmt={fmtBaseFromINR}/></div>
            <div className="chart-container">
              <div className="chart-card">
                <div className="chart-title">All Time — Categories</div>
                <PieChart data={catData.map((d,i)=>({...d,color:CATS[d.label]?.color||CC[i%CC.length]}))} fmt={fmtBaseFromINR}/>
              </div>
              <div className="chart-card">
                <div className="chart-title">All Time — Payments</div>
                <PieChart data={payData} fmt={fmtBaseFromINR}/>
              </div>
            </div>
            {catData.length>0&&(
              <div className="card">
                <div style={{fontWeight:600,marginBottom:12}}>📋 All-Time Category Bars</div>
                <BarChart data={catData.map(d=>({...d,icon:CATS[d.label]?.icon||''}))} colorFn={d=>CATS[d.label]?.color||'#667eea'} fmt={fmtBaseFromINR}/>
              </div>
            )}
            <div className="card">
              <div className="comparison-header">
                <span className="comparison-header-title">📆 Year-over-Year Comparison</span>
                <span className="comparison-legend">
                  <span><span style={{color:'#10b981'}}>↓</span> expense decrease = good</span>
                  <span><span style={{color:'#ef4444'}}>↑</span> expense increase</span>
                </span>
              </div>
              <table>
                <thead><tr>
                  <th>Year</th>
                  <th style={{textAlign:'right'}}>Expenses</th>
                  <th className="delta-col">vs Prev Year</th>
                  <th style={{textAlign:'right'}}>Exp Growth</th>
                  <th style={{textAlign:'right'}}>Income</th>
                  <th style={{textAlign:'right'}}>Saved</th>
                  <th style={{textAlign:'right'}}>Entries</th>
                </tr></thead>
                <tbody>{(()=>{
                  const rows=yearlyData.slice().reverse();
                  return rows.map(({label,value},i)=>{
                    const prevVal=rows[i+1]?.value;
                    const inc=income.filter(x=>x.date?.startsWith(label)).reduce((s,x)=>s+toINR(x),0);
                    const prevInc=rows[i+1]?income.filter(x=>x.date?.startsWith(rows[i+1].label)).reduce((s,x)=>s+toINR(x),0):null;
                    const cnt=expenses.filter(e=>e.date?.startsWith(label)).length;
                    const saved=inc-value;
                    const isCurrentYear=label===new Date().getFullYear().toString();

                    let expDelta=null;
                    if(prevVal!=null&&prevVal>0){
                      const pct=((value-prevVal)/prevVal*100);
                      const cls=pct>5?'delta-up':pct<-5?'delta-down':'delta-flat';
                      const arrow=pct>5?'↑':pct<-5?'↓':'–';
                      expDelta=<span className={cls}>{arrow}{Math.abs(pct).toFixed(0)}%</span>;
                    }

                    let incDelta=null;
                    if(prevInc!=null&&prevInc>0&&inc>0){
                      const pct=((inc-prevInc)/prevInc*100);
                      const cls=pct>0?'delta-down':'delta-up';
                      incDelta=<span className={cls} style={{fontSize:11}}>{pct>0?'↑':'↓'}{Math.abs(pct).toFixed(0)}% inc</span>;
                    }

                    return(
                      <tr key={i} style={isCurrentYear?{background:'rgba(102,126,234,.06)'}:{}}>
                        <td style={{fontWeight:700}}>
                          {label}{isCurrentYear&&<span className="insight-badge new">now</span>}
                        </td>
                        <td style={{textAlign:'right',color:'#ef4444',fontWeight:600}}>{fmtBaseFromINR(value)}</td>
                        <td className="delta-col">{expDelta||<span className="delta-flat">—</span>}</td>
                        <td style={{textAlign:'right'}}>{incDelta||<span className="delta-flat" style={{fontSize:11}}>—</span>}</td>
                        <td style={{textAlign:'right',color:'#10b981',fontWeight:600}}>{inc?fmtBaseFromINR(inc):'—'}</td>
                        <td style={{textAlign:'right',fontWeight:600,color:saved>=0?'#f59e0b':'#ef4444'}}>{inc?(saved>=0?'+':'')+fmtBaseFromINR(saved):'—'}</td>
                        <td style={{textAlign:'right',color:'var(--text3)'}}>{cnt}</td>
                      </tr>
                    );
                  });
                })()}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════
          INSIGHTS TAB  (Phase 4-5 complete)
      ══════════════════════════════════════════════════ */}
      {tab==='insights'&&(
        <>
          {/* ── Insight cards ── */}
          {insights.length===0?(
            <div className="empty-state"><div className="icon">💡</div><h3>Add more data for insights</h3><p>A few entries are needed to detect patterns</p></div>
          ):(
            <div className="insights-grid">{insights.map((ins,i)=><div key={i} className="insight-card"><h3>{ins.title}</h3><p>{ins.text}</p></div>)}</div>
          )}

          {/* ── 90-day Heatmap (4-5, 4-6, 4-7) ── */}
          {expenses.length>0&&(
            <div className="card">
              <div style={{fontWeight:600,marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
                🗓️ 90-Day Activity Heatmap
                <span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>Last 90 days · hover a cell for details</span>
              </div>
              <HeatmapCalendar expenses={expenses} income={income}/>
            </div>
          )}

          {/* ── Chart grid: category pie + payment pie ── */}
          {expenses.length>0&&(
            <div className="chart-container">
              <div className="chart-card">
                <div className="chart-title">By Category</div>
                <PieChart data={catData.map((d,i)=>({...d,color:CATS[d.label]?.color||CC[i%CC.length]}))} fmt={fmtBaseFromINR}/>
              </div>
              <div className="chart-card">
                <div className="chart-title">By Payment Method</div>
                <PieChart data={payData} fmt={fmtBaseFromINR}/>
              </div>
            </div>
          )}

          {/* ── Category BarChart (reusable component - 4-8 / 12-3) ── */}
          {catData.length>0&&(
            <div className="card">
              <div style={{fontWeight:600,marginBottom:12}}>📋 Category Breakdown</div>
              <BarChart
                data={catData.map(d=>({...d,icon:CATS[d.label]?.icon||''}))}
                colorFn={(d)=>CATS[d.label]?.color||'#667eea'}
                fmt={fmtBaseFromINR}
              />
            </div>
          )}

          {/* ── Expense Type BarChart ── */}
          {expTypeData.length>0&&(
            <div className="card">
              <div style={{fontWeight:600,marginBottom:12}}>🏷️ Expense Type Breakdown</div>
              <BarChart
                data={expTypeData}
                colorFn={(_,i)=>['#667eea','#10b981','#ef4444','#f59e0b','#8b5cf6','#ec4899'][i%6]}
                fmt={fmtBaseFromINR}
              />
            </div>
          )}

          {/* ── Dining App Breakdown (4-4) ── */}
          {diningData.length>0&&(
            <div className="card">

              <p>Download a copy of all your data. JSON is a full backup; CSV is for spreadsheets (expenses only).</p>
              <div className="settings-row">
                <div className="settings-row-label">
                  <strong>Export as JSON</strong>
                  <span>Full backup — expenses, income, settings. Re-importable.</span>
                </div>
                <button className="settings-btn settings-btn-primary" onClick={handleExport}>Download JSON</button>
              </div>
              <div className="settings-row">
                <div className="settings-row-label">
                  <strong>Export as CSV</strong>
                  <span>Expenses only — open in Excel, Google Sheets, etc.</span>
                </div>
                <button className="settings-btn settings-btn-ghost" onClick={handleExportCSV}>Download CSV</button>
              </div>
            </div>

            {/* ── Import ── */}
            <div className="settings-section">
              <h3>📥 Import Data</h3>
              <p>Import from any version — v2, v4, or v5. Duplicates are detected by content fingerprint and skipped automatically.</p>
              <div className="settings-row">
                <div className="settings-row-label">
                  <strong>Import JSON File</strong>
                  <span>Merges with existing data. Zero data loss.</span>
                </div>
                <label className="settings-btn settings-btn-ghost" style={{cursor:'pointer'}}>
                  Choose File
                  <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}}/>
                </label>
              </div>
              {importReport&&(
                <div style={{marginTop:12,padding:'10px 14px',borderRadius:8,background:importReport.error?'#fef2f2':'#f0fdf4',border:`1px solid ${importReport.error?'#fca5a5':'#86efac'}`,fontSize:12}}>
                  <div style={{fontWeight:700,color:importReport.error?'#991b1b':'#15803d',marginBottom:4}}>
                    {importReport.error?'❌ Failed':`✅ ${importReport.count} added${importReport.skipped?`, ${importReport.skipped} skipped`:''}`}
                  </div>
                  <pre style={{whiteSpace:'pre-wrap',color:'#374151',margin:0,lineHeight:1.5}}>{importReport.details}</pre>
                </div>
              )}
            </div>
          </div>

          {/* ── Danger Zone ── */}
          <div className="danger-zone">
            <h3>🚨 Danger Zone</h3>
            <p>These actions are permanent and cannot be undone. Each requires a confirmation step.</p>
            <div className="settings-row">
              <div className="settings-row-label">
                <strong>Clear All Expenses</strong>
                <span>Removes all {expenses.length} expense records. Income and settings kept.</span>
              </div>
              <button className="settings-btn settings-btn-danger" onClick={()=>setConfirmAction({type:'clear-expenses',label:'Clear All Expenses',detail:`This will permanently delete all ${expenses.length} expense records. Your ${income.length} income entries and settings will not be affected.`})}>Clear Expenses</button>
            </div>
            <div className="settings-row">
              <div className="settings-row-label">
                <strong>Clear All Income</strong>
                <span>Removes all {income.length} income records. Expenses and settings kept.</span>
              </div>
              <button className="settings-btn settings-btn-danger" onClick={()=>setConfirmAction({type:'clear-income',label:'Clear All Income',detail:`This will permanently delete all ${income.length} income records. Your ${expenses.length} expense entries and settings will not be affected.`})}>Clear Income</button>
            </div>
            <div className="settings-row">
              <div className="settings-row-label">
                <strong>Clear All Data</strong>
                <span>Wipes all {expenses.length+income.length} records. Dark mode preference kept.</span>
              </div>
              <button className="settings-btn settings-btn-danger" onClick={()=>setConfirmAction({type:'clear-all',label:'Clear All Data',detail:`This will permanently delete all ${expenses.length} expenses and ${income.length} income records (${expenses.length+income.length} total). Your dark mode preference will be kept.`})}>Clear All Data</button>
            </div>
            <div className="settings-row">
              <div className="settings-row-label">
                <strong>Factory Reset</strong>
                <span>Deletes everything — all data, rates cache, and settings. Fresh start.</span>
              </div>
              <button className="settings-btn settings-btn-danger-solid" onClick={()=>setConfirmAction({type:'factory-reset',label:'Factory Reset',detail:`This will delete ALL data: ${expenses.length} expenses, ${income.length} income records, exchange rate cache, and all settings including dark mode. The app will return to its initial state.`})}>Factory Reset</button>
            </div>
          </div>
        </>
        );
      })()}

      {/* ── MODALS ── */}
      {showEF&&<ExpenseForm
        onSubmit={addExpense}
        onEdit={updated=>{editExpense(updated);setEditExpTarget(null);}}
        onClose={()=>{setShowEF(false);setEditExpTarget(null);}}
        rateData={rateData}
        onRateUpdate={rd=>setRateData(rd)}
        initialData={editExpTarget||null}
        baseSym={baseSym} baseCurrCode={baseCurrency} baseRate={_baseRate}
      />}
      {showIF&&<IncomeForm
        onSubmit={addIncome}
        onEdit={updated=>{editIncome(updated);setEditIncTarget(null);}}
        onClose={()=>{setShowIF(false);setEditIncTarget(null);}}
        rateData={rateData}
        onRateUpdate={rd=>setRateData(rd)}
        initialData={editIncTarget||null}
        baseSym={baseSym} baseCurrCode={baseCurrency} baseRate={_baseRate}
      />}

      {confirmAction&&(
        <div className="confirm-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="conf-title" onClick={e=>e.target===e.currentTarget&&setConfirmAction(null)}>
          <div className="confirm-modal">
            <h3 id="conf-title">{confirmAction.type==='factory-reset'?'🏭':'🗑️'} {confirmAction.label}</h3>
            <p>{confirmAction.detail}</p>
            <div className="warning-box">
              ⚠️ This action is <strong>permanent and cannot be undone</strong>. Export a backup first if you want to keep your data.
            </div>
            <p style={{fontSize:12,color:'var(--text3)'}}>Are you absolutely sure you want to continue?</p>
            <div className="actions">
              <button className="btn" style={{background:'var(--surface2)',color:'var(--text2)'}} onClick={()=>setConfirmAction(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={executeConfirmedAction}>{confirmAction.type==='factory-reset'?'Reset Everything':'Yes, Delete'}</button>
            </div>
          </div>
        </div>
      )}

      {delTarget&&(
        <div className="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="del-title" onClick={e=>e.target===e.currentTarget&&setDelTarget(null)}>
          <div className="modal">
            <h3 id="del-title">🗑️ Delete this {delTarget.type}?</h3>
            <p style={{color:'var(--text2)',margin:'8px 0 20px',fontSize:13}}>This action cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn" style={{flex:1,background:'var(--surface2)',color:'var(--text2)'}} onClick={()=>setDelTarget(null)}>Cancel</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteItem}>Delete</button>
            </div>
          </div>
        </div>
      )}

            {/* ── TOAST STACK (Phase 7-6/7/8) ── */}
      <ToastStack toasts={toasts} onDismiss={dismissToast}/>

      <div style={{textAlign:'center',marginTop:16,fontSize:11,color:'var(--text4)'}}>
        Keys: 1–9 tabs · N expense · I income · D dark mode · Esc close &nbsp;|&nbsp;
        Storage: LZ-compressed · Budget Alerts · Goal Milestones · Recurring Reminders · Category Split · 90-day Heatmap · 259-colour Palette · Colorblind Mode · ARIA Support · Migration Engine v1.0
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
